<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Samantina Chef Vertical</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#1a0800;
  overscroll-behavior:none;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -webkit-text-size-adjust:none;
  position:fixed;
}
#c{
  display:block;
  position:absolute;
  top:0;left:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:none;
  touch-action:none;
}
/* Controls fixed, compactos y adaptados a pantalla vertical */
#ctrl{
  --ctrl-h:clamp(128px,22vh,180px);
  position:fixed;
  bottom:0;left:0;
  width:100%;
  min-height:var(--ctrl-h);
  background:linear-gradient(180deg,rgba(20,8,0,0.86),rgba(10,5,0,0.96));
  border-top:3px solid #f59f00;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px max(12px,env(safe-area-inset-left)) calc(10px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-right));
  z-index:50;
  pointer-events:all;
}
#ctrl.hidden{display:none}
/* D-pad */
#dpad{
  display:grid;
  grid-template-columns:repeat(3,clamp(42px,13vw,56px));
  grid-template-rows:repeat(3,clamp(42px,13vw,56px));
  gap:4px;
  flex-shrink:0;
}
.dp{
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  cursor:pointer;
  pointer-events:all;
  transition:background 0.07s,transform 0.07s;
  color:#fff;
}
.dp:active,.dp.on{background:rgba(255,200,60,0.45);transform:scale(0.92)}
/* Action buttons */
#btns{display:flex;gap:clamp(6px,2vw,10px);align-items:center;justify-content:flex-end;flex-shrink:0}
.gb{
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.35);
  font-weight:900;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;
  font-family:'Courier New',monospace;
  box-shadow:0 4px 16px rgba(0,0,0,0.6);
  transition:transform 0.07s,box-shadow 0.07s;
  line-height:1.2;
  pointer-events:all;
}
.gb:active{transform:scale(0.88);box-shadow:0 2px 6px rgba(0,0,0,0.5)}
#bDrop{width:clamp(50px,15vw,60px);height:clamp(50px,15vw,60px);font-size:11px;background:linear-gradient(135deg,#495057,#868e96);color:#fff}
#bCook,#bGrab{width:clamp(66px,20vw,82px);height:clamp(66px,20vw,82px);font-size:clamp(18px,5vw,22px)}
#bCook{background:linear-gradient(135deg,#1864ab,#4dabf7);color:#fff}
#bGrab{background:linear-gradient(135deg,#c05400,#ff922b);color:#fff}
@media (orientation:portrait){
  #ctrl{--ctrl-h:clamp(132px,20vh,164px);align-items:center}
  #dpad{grid-template-columns:repeat(3,clamp(38px,12vw,50px));grid-template-rows:repeat(3,clamp(38px,12vw,50px))}
  .dp{border-radius:14px;font-size:clamp(18px,5vw,22px)}
  #btns{gap:6px}
  .gb span{font-size:8px!important}
}
@media (max-width:380px){
  #ctrl{padding-left:8px;padding-right:8px;gap:6px}
  #btns{gap:4px}
}
/* Sound button */
#bSound{
  position:fixed;top:max(8px,env(safe-area-inset-top));left:10px;
  width:44px;height:44px;border-radius:50%;
  background:rgba(0,0,0,0.65);border:2px solid rgba(255,255,255,0.3);
  font-size:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:60;pointer-events:all;
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════
const C=document.getElementById('c');
const ctx=C.getContext('2d');
ctx.imageSmoothingEnabled=false;
// Mundo interno original: mantiene toda la lógica y posiciones del juego.
const GW=960,GH=640;
// Canvas vertical real para teléfono. El mundo se adapta a este lienzo tipo celular.
const RW=540,RH=820;
// Render vertical sin deformar: usamos cámara y zoom uniforme.
const FIT_SCALE=RW/GW;
const RENDER_SX=FIT_SCALE, RENDER_SY=FIT_SCALE;
let camX=0, camY=0;
const GAME_ZOOM=1.22;
const GAME_TOP=10;
let canvasScale=1,canvasOffX=0,canvasOffY=0;
function controlHeight(){
  const ctrl=document.getElementById('ctrl');
  if(!ctrl||ctrl.classList.contains('hidden'))return 0;
  return Math.ceil(ctrl.getBoundingClientRect().height||0);
}
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const ctrlH=controlHeight();
  const availH=Math.max(360,vh-ctrlH);

  // Modo vertical nativo: el canvas siempre es más alto que ancho.
  canvasScale=Math.min(vw/RW,availH/RH);
  const cw=RW*canvasScale, ch=RH*canvasScale;

  C.width=RW; C.height=RH;
  C.style.width=cw+'px';
  C.style.height=ch+'px';

  canvasOffX=(vw-cw)/2;
  canvasOffY=Math.max(0,(availH-ch)/2);
  C.style.left=canvasOffX+'px';
  C.style.top=canvasOffY+'px';
}
function screenToWorld(e){
  const rx=(e.clientX-canvasOffX)/canvasScale;
  const ry=(e.clientY-canvasOffY)/canvasScale;
  // Menú y tienda se dibujan a escala uniforme completa.
  if(G.state==='menu' || G.shopOpen){
    const fit=FIT_SCALE;
    const ox=(RW-GW*fit)/2;
    const oy=(RH-GH*fit)/2;
    return {mx:(rx-ox)/fit,my:(ry-oy)/fit,rx,ry};
  }
  // Juego vertical: cámara lateral sin comprimir personajes.
  return {mx:camX+(rx/GAME_ZOOM),my:camY+((ry-GAME_TOP)/GAME_ZOOM),rx,ry};
}
window.addEventListener('resize',resize);
// Resize when ctrl bar shows/hides
function setCtrl(show){
  const ctrl=document.getElementById('ctrl');
  if(!ctrl)return;
  ctrl.classList.toggle('hidden',!show);
  resize();
}
resize();

// ═══════════════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════════════
let muted=false,AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(freq,dur,type,vol,delay){
  if(muted)return;
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.type=type||'square';o.frequency.value=freq;
    const t=a.currentTime+(delay||0);
    g.gain.setValueAtTime(vol||0.04,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(a.destination);
    o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
function playPickup(){beep(700,0.05,'square',0.04);}
function playSuccess(){
  [523,659,784,1046].forEach((f,i)=>beep(f,0.12,'triangle',0.05,i*0.1));
}
function playFail(){beep(200,0.2,'sawtooth',0.05);setTimeout(()=>beep(150,0.15,'sawtooth',0.04),150);}
function playBurn(){beep(120,0.3,'sawtooth',0.06);}
function playSecret(){
  [880,1100,1320,1760].forEach((f,i)=>beep(f,0.08,'sine',0.05,i*0.06));
}
function playCoin(){beep(880,0.06,'sine',0.05);setTimeout(()=>beep(1200,0.1,'sine',0.05),70);}
function playTick(){beep(440,0.03,'square',0.02);}
function playUrgentTick(){
  // Tic-tic suave cuando queda poco tiempo al cliente
  beep(520,0.035,'square',0.022);
  beep(520,0.035,'square',0.018,0.09);
}
function playKitchenBell(){
  // Campana tipo cocina: plato listo
  beep(1320,0.10,'sine',0.07);
  beep(1760,0.16,'sine',0.055,0.11);
  beep(880,0.10,'triangle',0.035,0.28);
}

let bgMusicTimer=null,bgStep=0;
const COLLECT_MELODY=[392,440,494,523,587,523,494,440];
const COOK_MELODY=[330,392,440,494,440,392,330,294];
function startBGMusic(mode){
  stopBGMusic();
  const mel=mode==='cooking'?COOK_MELODY:COLLECT_MELODY;
  bgStep=0;
  bgMusicTimer=setInterval(()=>{
    if(muted)return;
    beep(mel[bgStep%mel.length],0.12,'triangle',0.015);
    bgStep++;
  },mode==='cooking'?220:280);
}
function stopBGMusic(){if(bgMusicTimer){clearInterval(bgMusicTimer);bgMusicTimer=null;}}

document.getElementById('bSound').onclick=()=>{
  muted=!muted;
  document.getElementById('bSound').textContent=muted?'🔇':'🔊';
  if(muted)stopBGMusic(); else if(G.state==='collect')startBGMusic('collect');
};

// ─── SHOP CATALOG ──────────────────────────────────────────────────
const SHOP_ITEMS=[

  {id:'life',     label:'Vida Extra',    emoji:'❤', desc:'Empieza con 4 vidas',                price:120, type:'life',  value:true},

// ═══════════════════════════════════════════════════════════════════
// GAME STATE

let G={
  state:'menu', // menu|collect|cooking|deliver|gameover|victory

  rankIdx:0,      // index into XP_RANKS
  stars:3,        // 3 stars = lives; lose on bad plate/burn/patience

// Particles + floats
let particles=[];
let floats=[];
let screenShake=0;

// ═══════════════════════════════════════════════════════════════════
// DRAW UTILS
// ═══════════════════════════════════════════════════════════════════
function px(x,y,w,h,fill,stroke,sw){
  ctx.fillStyle=fill;ctx.fillRect(~~x,~~y,~~w,~~h);
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.strokeRect(~~x,~~y,~~w,~~h);}
}
function circ(x,y,r,fill,stroke,sw){
  ctx.beginPath();ctx.arc(~~x,~~y,r,0,Math.PI*2);
  ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.stroke();}
}
function txt(t,x,y,size,color,align,shadow){
  ctx.save();
  ctx.font=`900 ${size}px "Courier New",monospace`;
  ctx.textAlign=align||'left';ctx.textBaseline='middle';
  if(shadow){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(t,~~x+2,~~y+2);}
  ctx.fillStyle=color;ctx.fillText(t,~~x,~~y);
  ctx.restore();
}
function em(e,x,y,size){
  ctx.save();ctx.font=`${size}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(e,~~x,~~y);ctx.restore();
}
function lerp(a,b,t){return a+(b-a)*t;}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function samCX(){return Sam.x+Sam.w/2;}
function samCY(){return Sam.y+Sam.h/2;}
function inRange(tx,ty,r){return dist(samCX(),samCY(),tx,ty)<(r||70);}

// ═══════════════════════════════════════════════════════════════════
// PARTICLES & FLOATS
// ═══════════════════════════════════════════════════════════════════
function spawnParticles(x,y,cols,n,upward){
  for(let i=0;i<(n||20);i++){
    const a=Math.random()*Math.PI*2;
    const spd=upward?(1+Math.random()*4):(0.5+Math.random()*3);
    particles.push({
      x,y,
      vx:Math.cos(a)*spd*(upward?0.6:1),
      vy:upward?(-2-Math.random()*3):(Math.sin(a)*spd),
      color:cols[~~(Math.random()*cols.length)],
      life:50+~~(Math.random()*60),maxLife:110,
      size:3+Math.random()*5,
    });
  }
}
function addFloat(t,x,y,col,sc){
  floats.push({t,x,y,color:col||'#fff',scale:sc||1,life:90,maxLife:90});
}
function updateDrawEffects(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.life--;
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(~~p.x,~~p.y,~~p.size,~~p.size);
    ctx.globalAlpha=1;
    return p.life>0;
  });
  floats=floats.filter(f=>{
    f.life--;f.y-=0.7;
    ctx.globalAlpha=f.life/f.maxLife;
    ctx.save();
    ctx.font=`900 ${~~(20*f.scale)}px "Courier New",monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(f.t,~~f.x+2,~~f.y+2);
    ctx.fillStyle=f.color;ctx.fillText(f.t,~~f.x,~~f.y);
    ctx.restore();
    ctx.globalAlpha=1;
    return f.life>0;
  });
}

// ═══════════════════════════════════════════════════════════════════
// DRAW BACKGROUND / KITCHEN
// ═══════════════════════════════════════════════════════════════════
function drawKitchen(){
  // Wall
  const wg=ctx.createLinearGradient(0,0,0,300);
  wg.addColorStop(0,'#fce4b0');wg.addColorStop(1,'#f5cc85');
  ctx.fillStyle=wg;ctx.fillRect(0,0,GW,310);
  // Wall tiles
  ctx.globalAlpha=0.1;
  for(let tx=0;tx<GW;tx+=50)for(let ty=0;ty<310;ty+=34){px(tx,ty,48,32,'#fff');}
  ctx.globalAlpha=1;

  // Floor
  const fg=ctx.createLinearGradient(0,310,0,GH);
  fg.addColorStop(0,'#c8854a');fg.addColorStop(1,'#a0632e');
  ctx.fillStyle=fg;ctx.fillRect(0,310,GW,GH-310);
  ctx.globalAlpha=0.12;
  for(let tx=0;tx<GW;tx+=70)for(let ty=310;ty<GH;ty+=70){px(tx,ty,68,68,'#fff');}
  ctx.globalAlpha=1;
  px(0,308,GW,6,'#7a3e18');

  // ── INGREDIENT SHELF (left wall) ──────────────────────────────
  const sh=ZONES.shelf;
  px(sh.x-4,sh.y-4,sh.w+8,sh.h+8,'#7a3e18');
  px(sh.x,sh.y,sh.w,sh.h,'#c49040','#8b5e1a',3);
  // shelf planks (horizontal lines)
  for(let r=0;r<6;r++){
    const ry=sh.y+8+r*55;
    px(sh.x,ry,sh.w,10,'#a07030','#7a5018',1);
  }
  txt('INGREDIENTES',sh.x+sh.w/2,sh.y-14,13,'#5c2e00','center',true);

  // ── STOVES ────────────────────────────────────────────────────
  STOVES.forEach((s,i)=>{
    const cx=s.x+s.w/2,cy=s.y+s.h/2;
    // back panel
    px(s.x-5,s.y-18,s.w+10,s.h+22,'#444','#222',3);
    // body
    px(s.x,s.y,s.w,s.h,'#d8d8d8','#888',2);
    // burner ring
    circ(cx,cy,24,'#333','#555',2);
    circ(cx,cy,16,'#222');
    // grate lines
    for(let g=-1;g<=1;g++)px(cx-18,cy-2+g*8,36,4,'#111');
    // label
    txt('🔥'+(i+1),cx,s.y-10,13,'#fff','center');
    // exhaust pipe
    px(cx-6,s.y-28,12,14,'#999','#666',2);
    px(cx-12,s.y-32,24,6,'#888','#666',2);
  });

  // Stove fire animation - always on, idle = small calm flame
  STOVES.forEach((s,i)=>{
    const cx=s.x+s.w/2;
    const st=G.stoves[i].state;
    const idlePower=0.45+Math.sin(G.ticks*0.12+i*1.3)*0.08;
    const activePower=st==='burning'?2.2:
                      st==='ready'?1.1:
                      (0.9+Math.min(1,G.stoves[i].timer/(G.stoves[i].max||1))*0.8);
    const power=st==='idle'?idlePower:activePower;
    const numFlames=st==='idle'?3:4;
    for(let f=0;f<numFlames;f++){
      const fx=cx-10+f*(st==='idle'?9:9),fy=s.y+s.h-4;
      const flick=Math.sin(G.ticks*0.2+f*1.4+i)*0.25;
      ctx.save();ctx.globalAlpha=st==='idle'?0.7:0.9;
      ctx.beginPath();
      ctx.moveTo(fx,fy+6);
      ctx.quadraticCurveTo(fx-(7+flick*3)*power,fy-3,fx,fy-(16+flick*4)*power);
      ctx.quadraticCurveTo(fx+(7+flick*3)*power,fy-3,fx,fy+6);
      ctx.fillStyle=f%2?'#ff922b':'#ff3b30';ctx.fill();
      ctx.beginPath();
      ctx.moveTo(fx,fy+4);
      ctx.quadraticCurveTo(fx-3*power,fy,fx,fy-7*power);
      ctx.quadraticCurveTo(fx+3*power,fy,fx,fy+4);
      ctx.fillStyle='#ffe066';ctx.fill();
      ctx.restore();
    }
    if(st!=='idle'){
      // Pan + food
      circ(cx,s.y+s.h/2-6,28,'#1a1a1a');
      circ(cx,s.y+s.h/2-8,24,'#2a2a2a');
      if(G.stoves[i].item) em(G.stoves[i].item.dish,cx,s.y+s.h/2-8,22);
      // progress arc
      const prog=Math.min(1,G.stoves[i].timer/(G.stoves[i].max||1));
      const sa=-Math.PI/2,ea=sa+Math.PI*2*prog;
      ctx.beginPath();ctx.arc(cx,s.y+s.h+14,15,sa,ea);
      ctx.strokeStyle=st==='burning'?'#ff4444':st==='ready'?'#44ff88':'#ffa94d';
      ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
      ctx.beginPath();ctx.arc(cx,s.y+s.h+14,15,ea,sa+Math.PI*2);
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=6;ctx.stroke();
      if(st==='burning'){
        for(let k=0;k<3;k++){
          const so=Math.sin(G.ticks*0.1+k)*5;
          ctx.globalAlpha=Math.max(0,0.5-k*0.12);
          circ(cx+so,s.y-28-k*16,7+k*4,'#999');
          ctx.globalAlpha=1;
        }
      }
    }
  });

  // ── COUNTER / BANDEJA ─────────────────────────────────────────
  const co=ZONES.counter;
  px(co.x+4,co.y+4,co.w,co.h,'rgba(0,0,0,0.2)');
  px(co.x,co.y,co.w,co.h,'#8b5e1a','#5c3a00',4);
  px(co.x+8,co.y+8,co.w-16,co.h-16,'#a07030');
  txt('BANDEJA',co.x+co.w/2,co.y-14,13,'#5c2e00','center',true);
  // Plates on tray
  G.tray.forEach((pl,pi)=>{
    const px2=co.x+22+pi*80,py2=co.y+co.h/2;
    circ(px2,py2,24,'#fff','#ccc',2);
    circ(px2,py2,20,'#f8f8f8');
    em(pl.dish,px2,py2,20);
    // quality dot
    circ(px2+16,py2-16,7,pl.quality==='perfect'?'#51cf66':pl.quality==='ok'?'#fcc419':'#ff6b6b');
  });

  // ── RESTAURANT ZONE ───────────────────────────────────────────
  px(620,145,330,GH-145,'rgba(255,245,215,0.25)');
  ctx.strokeStyle='#c49040';ctx.lineWidth=3;
  ctx.setLineDash([10,8]);
  ctx.strokeRect(620,145,330,GH-145);
  ctx.setLineDash([]);
  txt('RESTAURANTE',785,162,15,'#8b5e1a','center',true);

  // Tables
  TABLES.forEach((t,i)=>{
    if(i>=G.clients.length)return;
    px(t.x+4,t.y+4,t.w,t.h,'rgba(0,0,0,0.2)');
    px(t.x,t.y,t.w,t.h,'#8b5e1a','#5c3a00',3);
    px(t.x+8,t.y+8,t.w-16,t.h-16,'#a07030');
    // tablecloth
    px(t.x+12,t.y+12,t.w-24,t.h-24,'rgba(255,255,255,0.15)');
    // table legs
    [[t.x+10,t.y+t.h],[t.x+t.w-20,t.y+t.h]].forEach(([lx,ly])=>px(lx,ly,10,30,'#6b3810'));
  });

  // Delivery zone highlight
  if(G.state==='deliver'&&G.holding&&G.holding.type==='plate'){
    const c=G.clients.find(cl=>cl.status==='waiting');
    if(c){
      const t=TABLES[c.tableIdx];
      ctx.save();
      ctx.globalAlpha=0.25+Math.sin(G.ticks*0.1)*0.1;
      px(t.x-20,t.y-20,t.w+40,t.h+80,'#ffe066');
      ctx.globalAlpha=1;
      ctx.setLineDash([6,6]);
      ctx.strokeStyle='#f59f00';ctx.lineWidth=3;
      ctx.strokeRect(t.x-20,t.y-20,t.w+40,t.h+80);
      ctx.setLineDash([]);
      ctx.restore();
      txt('ENTREGAR AQUI',t.x+t.w/2,t.y-30,12,'#f59f00','center',true);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// DRAW SHELF ITEMS
// ═══════════════════════════════════════════════════════════════════
function drawShelf(){
  const sh=ZONES.shelf;
  // Find the single nearest item to Samantina
  let nearestIdx=-1, nearestDist=999;
  shelfItems.forEach((it,i)=>{
    if(it.taken)return;
    const d=Math.hypot(samCX()-(it.x+26), samCY()-(it.y+26));
    if(d<44 && d<nearestDist){nearestDist=d;nearestIdx=i;}
  });
  const cur=G.clients.find(c=>c.status==='waiting');
  shelfItems.forEach((it,i)=>{
    const bob=Math.sin(G.ticks*0.04+it.anim)*2;
    const near=(i===nearestIdx) && !it.taken;
    ctx.save();
    if(it.taken) ctx.globalAlpha=0.35; // dimmed = already in hand
    ctx.shadowOffsetY=3;
    ctx.shadowBlur=near?20:6;
    ctx.shadowColor=near?'#ffe066':'rgba(0,0,0,0.3)';
    px(it.x-2,it.y-2+bob,52,52,'#fff8e1','#d4a030',2);
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    em(it.icon,it.x+24,it.y+24+bob,28);
    if(near){
      ctx.strokeStyle='#ffd43b';ctx.lineWidth=3;
      ctx.strokeRect(it.x-4,it.y-4+bob,56,56);
      txt(it.icon,it.x+24,it.y-10+bob,11,'#333','center',true);
    }
    // Checkmark overlay if taken
    if(it.taken){
      ctx.globalAlpha=0.8;
      txt('✓',it.x+24,it.y+24+bob,20,'#51cf66','center');
    }
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════════════
// DRAW CUSTOMERS
// ═══════════════════════════════════════════════════════════════════
const SHIRT_COLS=['#74c0fc','#ff8fab','#b197fc','#a9e34b','#ffd43b','#ff6b6b'];
function drawCustomers(){
  G.clients.forEach((cl,ci)=>{
    const t=TABLES[cl.tableIdx];

    // Arrival: slide in from right edge
    // Departure: slide out to right
    let offX=0;
    if(cl.status==='arriving'){
      const prog=cl.arrivalT/100;
      offX=(1-prog)*(GW-t.x-t.w/2+80); // starts off-screen right
    } else if(cl.status==='leaving'){
      const prog=cl.departureT/100;
      offX=prog*(GW-t.x-t.w/2+80);
    }
    if(cl.status==='done')return;

    ctx.save();
    ctx.translate(offX,0);

    const cx=t.x+t.w/2;
    const bob=Math.sin(G.ticks*0.045+cl.bobOff)*2;

    // ANGER GESTURES: when patience < 30%, shake & show emojis
    const pFrac=1-cl.patienceTimer/cl.patienceMax;
    const angry=pFrac<0.3&&cl.status==='waiting';
    const angerShake=angry?Math.sin(G.ticks*0.4)*4:0;
    const basY=t.y-75+(angry?Math.sin(G.ticks*0.3)*3:0);
    const cy=basY+bob+angerShake;

    // Chair
    px(cx-20,t.y+t.h+2,40,10,'#6b3810');
    px(cx-18,t.y+t.h+10,12,26,'#5c2a00');
    px(cx+6,t.y+t.h+10,12,26,'#5c2a00');
    // Chair back (behind character, drawn first)
    px(cx-18,t.y-66,6,68,'#5c2a00');
    px(cx+12,t.y-66,6,68,'#5c2a00');
    px(cx-18,t.y-70,36,8,'#6b3810');

    // Shadow
    ctx.globalAlpha=0.18;
    circ(cx,t.y+t.h+6,22,6,'#000');
    ctx.globalAlpha=1;

    // Legs
    px(cx-14,cy+34,10,18,'#293241');
    px(cx+4,cy+34,10,18,'#293241');
    px(cx-16,cy+50,14,6,'#111');
    px(cx+2,cy+50,14,6,'#111');

    // Body
    const sc=SHIRT_COLS[ci%SHIRT_COLS.length];
    px(cx-16,cy+6,32,28,sc,'rgba(0,0,0,0.15)',1);
    px(cx-10,cy+8,20,24,'#fff5e6');
    // apron stripe
    px(cx-14,cy+24,28,5,'rgba(0,0,0,0.2)');

    // Arms
    const react=cl.reaction;
    if(react==='happy'){
      px(cx-24,cy-4,10,24,'#ffc9a3'); px(cx+14,cy-4,10,24,'#ffc9a3');
      em('✨',cx-28,cy-10,16); em('⭐',cx+28,cy-10,16);
    } else {
      px(cx-22,cy+10,10,20,'#ffc9a3'); px(cx+12,cy+10,10,20,'#ffc9a3');
    }

    // Neck
    px(cx-6,cy,12,8,'#ffc9a3');

    // Head
    let faceCol='#ffc9a3';
    if(react==='bad'||react==='burn') faceCol='#7ecf78';
    circ(cx,cy-12,20,faceCol,'rgba(0,0,0,0.1)',1);

    // Hair (alternating styles)
    const hairC=['#4a2b13','#8a4b18','#2b170b','#c0392b'][ci%4];
    if(cl.gender==='woman'){
      ctx.beginPath();ctx.arc(cx,cy-14,22,Math.PI*0.72,Math.PI*2.28);
      ctx.strokeStyle=hairC;ctx.lineWidth=8;ctx.stroke();
      px(cx-20,cy-16,8,22,hairC);px(cx+12,cy-16,8,22,hairC);
      // bun
      circ(cx-8,cy-32,8,'#fff');circ(cx+2,cy-36,10,'#fff');circ(cx+12,cy-32,8,'#fff');
      px(cx-10,cy-28,22,6,'#fff');
    } else {
      ctx.beginPath();ctx.arc(cx,cy-18,21,Math.PI*0.9,Math.PI*2.1);
      ctx.strokeStyle=hairC;ctx.lineWidth=9;ctx.stroke();
      px(cx-12,cy-28,24,10,hairC);
    }

    // FACE EXPRESSIONS
    if(react==='happy'){
      px(cx-8,cy-14,4,4,'#222');px(cx+4,cy-14,4,4,'#222');
      ctx.beginPath();ctx.arc(cx,cy-4,10,0,Math.PI);
      ctx.strokeStyle='#c0392b';ctx.lineWidth=3;ctx.stroke();
      ctx.globalAlpha=0.4;circ(cx,cy-12,22,'#ffe066');
      ctx.globalAlpha=1;
      // Happy glow rings
      for(let g=0;g<4;g++){
        ctx.globalAlpha=0.15;
        circ(cx,cy-12,26+g*14,'#ffe066');
      }
      ctx.globalAlpha=1;
      em('✨',cx-28,cy-40,18);em('⭐',cx+24,cy-44,18);
    } else if(react==='bad'){
      ctx.globalAlpha=0.3;circ(cx,cy-12,20,'#38b000');ctx.globalAlpha=1;
      px(cx-10,cy-16,8,4,'#222');px(cx+2,cy-16,8,4,'#222');
      px(cx-10,cy-20,8,3,'#5f0f40');px(cx+2,cy-20,8,3,'#5f0f40');
      ctx.beginPath();ctx.arc(cx,cy-2,8,Math.PI,0);ctx.strokeStyle='#5f0f40';ctx.lineWidth=3;ctx.stroke();
      em('🤢',cx+24,cy-6,20);
    } else if(react==='burn'){
      ctx.globalAlpha=0.45;circ(cx,cy-12,20,'#333');ctx.globalAlpha=1;
      txt('×',cx-8,cy-12,15,'#111','center');txt('×',cx+8,cy-12,15,'#111','center');
      circ(cx,cy-2,6,'#111');
      em('💨',cx+24,cy-18,16);em('🔥',cx-24,cy,16);
    } else {
      // neutral waiting
      px(cx-8,cy-14,4,4,'#222');px(cx+4,cy-14,4,4,'#222');
      px(cx-3,cy-4,6,3,'#a4161a');
    }

    // ORDER BUBBLE — sits above the character's head
    if(cl.status==='waiting'||cl.status==='arriving'){
      const bw=130,bh=56;
      const bx=cx-bw/2;
      // Place bubble above head (head top ≈ cy-32)
      const by=cy-44-bh;
      const isActive=cl.status==='waiting'&&G.clients.find(c=>c.status==='waiting')===cl;
      // shadow
      px(bx+3,by+3,bw,bh,'rgba(0,0,0,0.25)');
      px(bx,by,bw,bh,'#fffde7',isActive?'#f59f00':'#c49040',isActive?4:2);
      // tail pointing down toward head
      ctx.beginPath();
      ctx.moveTo(cx-6,by+bh);ctx.lineTo(cx+6,by+bh);ctx.lineTo(cx,by+bh+10);
      ctx.fillStyle='#fffde7';ctx.fill();
      ctx.strokeStyle=isActive?'#f59f00':'#c49040';ctx.lineWidth=isActive?4:2;ctx.stroke();
      // dish icon
      em(cl.recipe.dish,bx+22,by+bh/2,28);
      // recipe name
      txt(cl.recipe.name,bx+70,by+14,11,'#5c2e00','center',true);
      // ingredient icons row
      cl.recipe.need.slice(0,5).forEach((ic,ni)=>em(ic,bx+42+ni*20,by+38,14));


    }

    // PATIENCE BAR
    if(cl.status==='waiting'){
      const bw=70,bh=10,bx=cx-bw/2,by=t.y+t.h+8;
      px(bx,by,bw,bh,'rgba(0,0,0,0.4)');
      const frac=1-cl.patienceTimer/cl.patienceMax;
      const col=frac>0.5?'#51cf66':frac>0.25?'#fcc419':'#ff6b6b';
      px(bx+1,by+1,Math.max(0,(bw-2)*frac),bh-2,col);
      // pulsate warning
      if(frac<0.25){
        ctx.globalAlpha=0.4+Math.sin(G.ticks*0.2)*0.3;
        px(bx,by,bw,bh,'rgba(255,0,0,0.3)');
        ctx.globalAlpha=1;
      }
      em('⏱',cx,by+5,12);
    }

    // Served plate on table
    if(cl.status==='eating'||cl.status==='done'){
      em(cl.recipe.dish,t.x+t.w/2,t.y+t.h/2,30);
    }

    // Stars earned
    if((cl.status==='eating'||cl.status==='done')&&cl.stars>0){
      if(cl.stars>0)txt('⭐'.repeat(Math.max(0,cl.stars)),cx,t.y-55,14,'#ffd700','center',true);
    }
    // Anger emoji when losing patience
    if(angry){
      const angerEmojis=['😤','😠','⏰','😡'];
      const ae=angerEmojis[~~(G.ticks/20)%angerEmojis.length];
      em(ae,cx+38,cy-50,18);
      // Fist shake
      if(~~(G.ticks/10)%2===0) em('✊',cx+30,cy-30,16);
    }

    ctx.restore(); // end arrival/departure translate
  });
}

// ═══════════════════════════════════════════════════════════════════
// DRAW SAMANTINA
// ═══════════════════════════════════════════════════════════════════
function drawSam(){
  const x=Sam.x,y=Sam.y;
  const walk=Math.sin(Sam.walkTimer*0.22)*4;
  const flip=Sam.dir<0;
  const faceType=Sam.face;

  ctx.save();
  if(flip){ctx.scale(-1,1);ctx.translate(-GW,0);}
  const dx=flip?GW-x-Sam.w:x;

  // Shadow
  ctx.globalAlpha=0.2;circ(dx+Sam.w/2,y+Sam.h+3,20,7,'#000');ctx.globalAlpha=1;

  // Legs
  px(dx+7,y+32+Math.max(0,walk),11,17,'#293241');
  px(dx+18,y+32+Math.max(0,-walk),11,17,'#293241');
  px(dx+5,y+47+Math.max(0,walk),15,6,'#111');
  px(dx+16,y+47+Math.max(0,-walk),15,6,'#111');

  // Dress
  px(dx+3,y+18,28,20,'#70d06b','rgba(0,0,0,0.1)',1);
  px(dx+9,y+19,16,18,'#fff5e6');
  px(dx+5,y+29,24,5,'#2b9348');

  // Arms
  if(faceType==='happy'){
    px(dx-5,y+6,9,22,'#ffc9a3');px(dx+30,y+6,9,22,'#ffc9a3');
    em('✨',dx-10,y+2,14);em('🌟',dx+42,y+2,14);
  } else if(faceType==='bad'){
    px(dx-3,y+20,9,20,'#ffc9a3');px(dx+28,y+20,9,20,'#ffc9a3');
    em('🤢',dx+42,y+22,18);
  } else if(faceType==='burn'){
    px(dx-6,y+14,9,24,'#ffc9a3');px(dx+31,y+14,9,24,'#ffc9a3');
    em('🔥',dx+42,y+22,18);
  } else {
    px(dx-1,y+22,9,18,'#ffc9a3');px(dx+26,y+22,9,18,'#ffc9a3');
  }

  // Neck
  px(dx+12,y+12,10,8,'#ffc9a3');
  // Head
  circ(dx+17,y+7,16,'#ffc9a3');
  // Hair
  ctx.beginPath();ctx.arc(dx+17,y+5,19,Math.PI*0.75,Math.PI*2.25);
  ctx.strokeStyle='#8a4b18';ctx.lineWidth=7;ctx.stroke();
  px(dx+1,y+0,7,16,'#8a4b18');px(dx+27,y+0,7,16,'#8a4b18');

  // Chef hat - color depends on upgrade
  const hatC=G.upgrades.hatColor==='pink'?'#ffb3d9':G.upgrades.hatColor==='blue'?'#74c0fc':G.upgrades.hatColor==='gold'?'#ffd700':'#fff';
  const hatS=G.upgrades.hatColor==='gold'?'#f59f00':G.upgrades.hatColor==='pink'?'#e64980':G.upgrades.hatColor==='blue'?'#339af0':'rgba(0,0,0,0.1)';
  circ(dx+7,y-5,9,hatC);circ(dx+17,y-10,12,hatC);circ(dx+27,y-5,9,hatC);
  px(dx+6,y+1,24,9,hatC,hatS,1);

  // Face
  if(faceType==='happy'){
    px(dx+9,y+4,4,4,'#222');px(dx+22,y+4,4,4,'#222');
    ctx.beginPath();ctx.arc(dx+17,y+14,8,0,Math.PI);ctx.strokeStyle='#c0392b';ctx.lineWidth=3;ctx.stroke();
    ctx.globalAlpha=0.5;circ(dx+7,y+12,4,'#ff8fab');circ(dx+27,y+12,4,'#ff8fab');ctx.globalAlpha=1;
    // glow rays
    for(let r=0;r<6;r++){
      const a=G.ticks*0.06+r*Math.PI/3;
      em(r%2?'✨':'⭐',dx+17+Math.cos(a)*38,y+5+Math.sin(a)*26,14);
    }
  } else if(faceType==='bad'){

// ═══════════════════════════════════════════════════════════════════
// DRAW COOKING MINIGAME OVERLAY
// ═══════════════════════════════════════════════════════════════════
function drawCookingOverlay(){
  if(G.state!=='cooking')return;
  const s=STOVES[G.cookStoveIdx];
  const cx=s.x+s.w/2;
  const cy=s.y+s.h+26; // center of progress arc (below stove)

  const fill=G.cookFill;
  const R=30; // arc radius

  // ── Draw arc ring around the stove burner area ─────────────────
  // Background ring (dark)
  ctx.beginPath();
  ctx.arc(cx,s.y+s.h/2-6,R+4,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=10;ctx.stroke();

  // Colored zones (draw full ring in sections)
  function arcSect(start,end,col){
    ctx.beginPath();
    ctx.arc(cx,s.y+s.h/2-6,R+4,start-Math.PI/2,end-Math.PI/2);
    ctx.strokeStyle=col;ctx.lineWidth=10;ctx.stroke();
  }
  arcSect(0,0.25*Math.PI*2,'#c0392b');          // red early
  arcSect(0.25*Math.PI*2,0.43*Math.PI*2,'#fcc419'); // yellow ok
  arcSect(0.43*Math.PI*2,0.57*Math.PI*2,'#51cf66'); // green perfect
  arcSect(0.57*Math.PI*2,0.75*Math.PI*2,'#fcc419'); // yellow ok
  arcSect(0.75*Math.PI*2,1.0*Math.PI*2,'#c0392b');  // red burn

  // Dark mask over the "not yet" part of the ring
  ctx.save();
  ctx.globalAlpha=0.6;
  ctx.beginPath();
  ctx.arc(cx,s.y+s.h/2-6,R+4,fill*Math.PI*2-Math.PI/2,Math.PI*2-Math.PI/2);
  ctx.strokeStyle='#111';ctx.lineWidth=11;ctx.stroke();
  ctx.globalAlpha=1;ctx.restore();

  // White leading dot (the "needle")
  const needleA=fill*Math.PI*2-Math.PI/2;
  const nx=cx+Math.cos(needleA)*(R+4);
  const ny=(s.y+s.h/2-6)+Math.sin(needleA)*(R+4);
  circ(nx,ny,7,'#fff','rgba(0,0,0,0.4)',2);

  // Pulsing PRESS hint near stove (small, no modal)
  const inGreen=fill>=0.43&&fill<=0.57;
  const inYellow=fill>=0.25&&fill<=0.75;
  const hintCol=inGreen?'#51cf66':inYellow?'#fcc419':'#fff';
  const hintMsg=inGreen?'¡AHORA!':inYellow?'¡OK!':'...';
  ctx.save();
  ctx.globalAlpha=inGreen?(0.75+Math.sin(G.ticks*0.35)*0.25):0.9;
  txt(hintMsg,cx,s.y-42,inGreen?18:13,hintCol,'center',true);
  ctx.restore();

  // Burn warning flash
  if(fill>0.82){
    ctx.save();ctx.globalAlpha=0.5+Math.sin(G.ticks*0.4)*0.4;
    em('🔥',cx,s.y-56,20);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
let shopScroll=0; // which row we're on (for mobile scroll)

let shopScrollY=0; // pixel scroll offset

function drawShop(){
  // Background
  const bg=ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,'#1a0a00');bg.addColorStop(1,'#0d0500');
  ctx.fillStyle=bg;ctx.fillRect(0,0,GW,GH);

  // Header bar
  px(0,0,GW,62,'#2d1400');
  px(0,60,GW,4,'#f59f00');
  txt('🛒 TIENDA',GW/2,32,28,'#ffd700','center',true);
  txt('💰 $'+G.money,18,34,20,'#51cf66','left');
  // Active upgrades summary
  const activeU=shopBought.map(id=>{const it=SHOP_ITEMS.find(s=>s.id===id);return it?it.emoji:'';}).join(' ');
  if(activeU) txt('Activo: '+activeU,GW/2,58,14,'#aaa','center');
  // Close button
  const closeX=GW-64,closeY=8,closeW=56,closeH=46;
  px(closeX,closeY,closeW,closeH,'#8b0000','#ff4444',3);
  txt('✕',closeX+closeW/2,closeY+closeH/2,22,'#fff','center');
  drawShop._closeRect={x:closeX,y:closeY,w:closeW,h:closeH};

  // 2-column grid, scrollable
  const cols=2, iw=440, ih=130, gx=20, gy=74-shopScrollY, gap=12;
  const totalRows=Math.ceil(SHOP_ITEMS.length/cols);
  const totalH=totalRows*(ih+gap)+gap;
  drawShop._totalH=totalH;
  drawShop._gy0=74;

  // Clip to content area
  ctx.save();
  ctx.beginPath();ctx.rect(0,64,GW,GH-64);ctx.clip();

  SHOP_ITEMS.forEach((item,i)=>{
    const col=i%cols, row=~~(i/cols);
    const ix=gx+col*(iw+gap), iy=gy+row*(ih+gap);
    if(iy+ih<64||iy>GH)return; // off-screen skip
    const owned=shopBought.includes(item.id);
    const canBuy=G.money>=item.price&&!owned;

    const cardCol=owned?'#0e2e0e':canBuy?'#1e1000':'#111';
    const borderCol=owned?'#51cf66':canBuy?'#f59f00':'#333';
    const borderW=owned||canBuy?4:2;
    px(ix+4,iy+4,iw,ih,'rgba(0,0,0,0.3)');
    px(ix,iy,iw,ih,cardCol,borderCol,borderW);

    // Owned badge
    if(owned){
      px(ix,iy,iw,22,'#1a5e1a');
      txt('✓ COMPRADO',ix+iw/2,iy+11,13,'#7bf77b','center');
    }

    // Emoji big
    const emojiY=iy+(owned?34:ih/2);
    em(item.emoji,ix+48,emojiY,40);

    // Text block
    const tx=ix+88, ty=owned?iy+32:iy+22;
    txt(item.label,tx,ty,16,'#fff','left');
    // Desc word-wrap (simple)
    const words=item.desc.split(' ');
    let line='',ly=ty+24;
    words.forEach(w=>{
      if((line+w).length>28){
        txt(line.trim(),tx,ly,11,'#aaa','left');
        line=w+' ';ly+=15;
      } else line+=w+' ';
    });
    if(line.trim()) txt(line.trim(),tx,ly,11,'#aaa','left');

    // Price
    if(!owned){
      const priceY=iy+ih-18;
      const priceCol=canBuy?'#ffd700':'#ff6b6b';
      const priceIcon=canBuy?'💰':'🔒';
      txt(priceIcon+' $'+item.price,ix+iw/2,priceY,16,priceCol,'center');
    }

    item._rect={x:ix,y:iy+shopScrollY,w:iw,h:ih}; // un-scroll for click
  });

  ctx.restore();

  // Scroll indicator
  if(totalH>GH-64){
    const trackH=GH-74;
    const thumbH=Math.max(40,trackH*(GH-64)/totalH);
    const thumbY=74+(shopScrollY/(totalH-(GH-64)))*(trackH-thumbH);
    px(GW-10,74,8,trackH,'rgba(255,255,255,0.1)');
    px(GW-10,thumbY,8,thumbH,'rgba(255,200,0,0.5)');
  }

  // Bottom hint
  px(0,GH-30,GW,30,'rgba(0,0,0,0.6)');
  txt('Toca un artículo para comprarlo · Los cambios se aplican de inmediato',GW/2,GH-15,11,'#666','center');
}

function handleShopClick(mx,my){
  // Close button
  const cl=drawShop._closeRect;
  if(cl&&mx>=cl.x&&mx<=cl.x+cl.w&&my>=cl.y&&my<=cl.y+cl.h){
    G.shopOpen=false;return;
  }
  SHOP_ITEMS.forEach(item=>{
    if(!item._rect)return;
    const r=item._rect;
    if(mx<r.x||mx>r.x+r.w||my<r.y||my>r.y+r.h)return;
    if(shopBought.includes(item.id)){addFloat('Ya lo tienes',GW/2,GH/2,'#aaa');return;}
    if(G.money<item.price){addFloat('¡No tienes $'+item.price+'!',GW/2,GH/2,'#ff6b6b',1.2);return;}
    G.money-=item.price;
    shopBought.push(item.id);
    saveShop();
    if(G.money>G.best){G.best=G.money;localStorage.setItem('sch2_best',G.best);}
    playSuccess();
    addFloat('✓ '+item.label+'!',GW/2,GH/2-40,'#51cf66',1.3);
    // Apply upgrade IMMEDIATELY (no need to restart game)
    if(item.type==='hat')    G.upgrades.hatColor=item.value;
    if(item.type==='walk')   G.upgrades.fasterWalk=true;
    if(item.type==='range')  G.upgrades.biggerRange=true;
    if(item.type==='double') G.upgrades.doublePoints=true;
    if(item.type==='time')   G.upgrades.extraTime+=item.value;
    if(item.type==='life'&&G.stars<3) G.stars=Math.min(3,G.stars+1);
  });
}

// INIT GAME (XP-based, no levels)
// ═══════════════════════════════════════════════════════════════════
function currentRank(){
  let r=XP_RANKS[0];
  for(let i=XP_RANKS.length-1;i>=0;i--){if(G.xp>=XP_RANKS[i].xp){r=XP_RANKS[i];break;}}
  return r;
}
function currentRankIdx(){
  let idx=0;
  for(let i=XP_RANKS.length-1;i>=0;i--){if(G.xp>=XP_RANKS[i].xp){idx=i;break;}}
  return idx;
}
function patienceForRank(){
  return (currentRank().patience + G.upgrades.extraTime)*60;
}



function clearCollected(){
  G.collected=[null,null,null,null,null];
}
function collectedCount(){
  return G.collected.filter(Boolean).length;
}
function collectedFull(){
  return collectedCount()>=5;
}
function addIngredient(icon){
  const cur=G.clients.find(c=>c.status==='waiting');
  if(!cur)return false;
  const recipe=cur.recipe.need;
  const correctIndex=recipe.indexOf(icon);
  // Si corresponde al pedido, marcarlo exactamente en su posición real.
  if(correctIndex!==-1 && !G.collected[correctIndex]){
    G.collected[correctIndex]=icon;
    return true;
  }
  // Si es incorrecto o repetido, usar el primer espacio libre para que el jugador lo vea en rojo.
  for(let i=0;i<5;i++){
    if(!G.collected[i]){
      G.collected[i]=icon;
      return true;
    }
  }
  return false;
}

function forceLevelOneStart(){
  // Limpia cualquier estado viejo de prueba y asegura nivel 1.
  G.xp=0;
  G.rankIdx=0;
  G.score=0;
  G.money=0;
  G.stars=G.upgrades.extraLife?4:3;
  G.secretBonus=false;
  G.secretActive=false;
  clearCollected();
  G.holding=null;
  G.tray=[];
  G.clients=[];
  G.clientQueue=[];
  G.stoves.forEach(st=>{st.state='idle';st.item=null;st.timer=0;st.max=0;st.recipeId=-1;st.quality='';});
}

function spawnClientIntoQueue(){
  const rank=currentRank();
  const pool=rank.recipePool;
  const rId=pool[~~(Math.random()*pool.length)];
  const rec=RECIPES[rId];
  // Find free table slot
  const usedTables=G.clients.filter(c=>c.status!=='done').map(c=>c.tableIdx);
  const freeTable=TABLES.findIndex((_,i)=>!usedTables.includes(i));
  if(freeTable<0)return; // all tables full
  G.clients.push({
    id:G.totalServed+G.clients.length,
    tableIdx:freeTable,
    recipe:rec,
    gender:Math.random()>0.5?'woman':'man',
    status:'arriving',
    arrivalT:0,
    departureT:0,
    patienceTimer:0,
    patienceMax:patienceForRank(),
    lastUrgentSecond:null,
    reaction:null,
    stars:0,
    bobOff:Math.random()*Math.PI*2,
    angerFrame:0,
  });
  buildShelf();
}

function initGame(){
  G.ticks=0;
  clearCollected();
  G.holding=null;
  G.tray=[];
  G.cookFill=0;
  G.secretActive=false;G.secretTimer=0;G.secretBonus=false;
  secretSpawnedThisLevel=false;
  G.stoves.forEach(s=>{s.state='idle';s.item=null;s.timer=0;s.max=0;});
  particles=[];floats=[];
  G.clients=[];
  G.totalServed=0;
  G.clientSpawnTick=120; // first client after 2s
  Sam.x=300;Sam.y=420;Sam.face='normal';Sam.faceTimer=0;Sam.walkTimer=0;
  G.state='collect';
  startBGMusic('collect');
}

function buildShelf(){
  shelfItems=[];

  // Always include ALL 5 ingredients of the CURRENT active client
  const cur=G.clients.find(c=>c.status==='waiting');
  if(!cur)return;
  const needed=[...cur.recipe.need]; // always exactly 5, no dedup

  // Also include needed ingredients of other waiting clients (bonus)
  const otherNeeded=new Set();
  G.clients.forEach((cl,ci)=>{
    if(cl===cur||cl.status!=='waiting')return;
    cl.recipe.need.forEach(ic=>{if(!needed.includes(ic))otherNeeded.add(ic);});
  });

  // Pick decoys: from current client's decoyPool, none already in needed
  const decoys=cur.recipe.decoyPool
    .filter(d=>!needed.includes(d))
    .sort(()=>Math.random()-0.5)
    .slice(0,3);

  // Build final list: needed first (guaranteed), then other-client needs, then decoys
  const all=[...needed,...[...otherNeeded].slice(0,2),...decoys]
    .sort(()=>Math.random()-0.5);

  // Layout in 2 columns inside the shelf zone
  const sh=ZONES.shelf;
  const cols=2,cw=56,ch=54;
  const sx=sh.x+8,sy=sh.y+14;
  all.forEach((icon,i)=>{
    const col=i%cols,row=~~(i/cols);
    shelfItems.push({
      icon,
      name:icon,
      x:sx+col*(cw+6),
      y:sy+row*(ch+4),
      anim:Math.random()*Math.PI*2,
      taken:false,
    });
  });
}

// MOVEMENT & COLLISION
// ═══════════════════════════════════════════════════════════════════
const keys={};
const dpad2={up:false,down:false,left:false,right:false};
function moveSpeed(){return G.upgrades.fasterWalk?4.8:3.4;}

function moveSam(){
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']||dpad2.left)dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']||dpad2.right)dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W']||dpad2.up)dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']||dpad2.down)dy=1;
  if(!dx&&!dy)return;
  const spd=moveSpeed();
  const len=Math.hypot(dx,dy);
  Sam.x+=dx/len*spd;
  Sam.y+=dy/len*spd;
  Sam.walkTimer++;
  if(dx!==0)Sam.dir=dx>0?1:-1;

  // Bounds
  Sam.x=Math.max(10,Math.min(GW-Sam.w-10,Sam.x));
  Sam.y=Math.max(55,Math.min(GH-Sam.h-10,Sam.y));

  // Stove collision (block walking into them)
  STOVES.forEach(s=>{
    const pad=8;
    const sl=s.x-pad,sr=s.x+s.w+pad,st=s.y-pad,sb=s.y+s.h+pad;
    const bl=Sam.x+4,br=Sam.x+Sam.w-4,bt=Sam.y+20,bb=Sam.y+Sam.h;
    if(br>sl&&bl<sr&&bb>st&&bt<sb){
      const oL=br-sl,oR=sr-bl,oT=bb-st,oB=sb-bt;
      const m=Math.min(oL,oR,oT,oB);
      if(m===oL)Sam.x=sl-Sam.w+4;
      else if(m===oR)Sam.x=sr-4;
      else if(m===oT)Sam.y=st-Sam.h;
      else Sam.y=sb-20;
    }
  });
}

function doGrab(){
  if(G.state==='menu'){startGame();return;}
  if(G.state==='gameover'||G.state==='victory'){resetToMenu();return;}

  if(G.state==='collect'){
    // Try pickup secret ingredient
    if(G.secretActive&&inRange(G.secretPos.x,G.secretPos.y,50)){
      G.secretActive=false;G.secretBonus=true;
      playSecret();
      addFloat('✨ BONUS x2 ACTIVADO! ✨',G.secretPos.x,G.secretPos.y,'#ffd700',1.4);
      spawnParticles(G.secretPos.x,G.secretPos.y,['#ffd700','#fff','#ffe066'],25,true);
      return;
    }
    // Try pickup shelf ingredient
    // Use same nearestIdx logic as drawShelf: single closest non-taken item
    const pickR=G.upgrades.biggerRange?64:44;
    let pIdx=-1,pDist=999;
    for(let i=0;i<shelfItems.length;i++){
      if(shelfItems[i].taken)continue;
      const d=Math.hypot(samCX()-(shelfItems[i].x+26),samCY()-(shelfItems[i].y+26));
      if(d<pickR&&d<pDist){pDist=d;pIdx=i;}
    }
    for(let i=0;i<shelfItems.length;i++){
      const it=shelfItems[i];
      if(i!==pIdx)continue;
      if(collectedFull()){
        addFloat('¡Máx 5 ingredientes!',Sam.x+17,Sam.y,'#ff6b6b');
        beep(200,0.08,'sawtooth',0.03);
        return;
      }
      it.taken=true;
      if(!addIngredient(it.icon)){
        addFloat('¡Máx 5 ingredientes!',Sam.x+17,Sam.y,'#ff6b6b');
        beep(200,0.08,'sawtooth',0.03);
        return;
      }
      G.holding={type:'ing',icon:it.icon};
      playPickup();
      addFloat(it.icon,Sam.x+Sam.w,Sam.y,'#fff',1.2);
      setTimeout(()=>{if(G.holding&&G.holding.type==='ing')G.holding=null;},600);
      return;
    }
    // Try pick plate from tray
    const co=ZONES.counter;
    if(inRange(co.x+co.w/2,co.y+co.h/2,90)&&G.tray.length>0&&!G.holding){
      G.holding=G.tray.shift();
      G.holding.type='plate';
      G.state='deliver';
      playPickup();
      addFloat('Lleva el plato al cliente',Sam.x+17,Sam.y,'#74c0fc');
      return;
    }
    return;
  }

  if(G.state==='deliver'){
    tryDeliver();
    return;
  }
}

function dropLastIngredient(){
  if(G.state!=='collect')return;
  if(collectedCount()===0){
    addFloat('No hay ingredientes',Sam.x+17,Sam.y,'#ff9999');
    return;
  }
  let dropIdx=-1;
  for(let i=4;i>=0;i--){
    if(G.collected[i]){dropIdx=i;break;}
  }
  if(dropIdx<0)return;
  const dropped=G.collected[dropIdx];
  G.collected[dropIdx]=null;
  G.holding=null;
  // Restore the shelf item so it can be picked again
  for(let i=shelfItems.length-1;i>=0;i--){
    if(shelfItems[i].taken && shelfItems[i].icon===dropped){
      shelfItems[i].taken=false;
      break;
    }
  }
  beep(200,0.06,'sawtooth',0.03);
  addFloat('Soltaste: '+dropped,Sam.x+17,Sam.y,'#ffcc88');
}

function doCook(){
  if(G.state==='menu'){startGame();return;}
  if(G.state==='gameover'||G.state==='victory'){resetToMenu();return;}

  if(G.state==='cooking'){
    // Press timing
    pressTiming();
    return;
  }

  if(G.state==='collect'){
    // Need 5 ingredients collected
    if(collectedCount()<5){
      addFloat('¡Necesitas 5 ingredientes!',Sam.x+17,Sam.y,'#ff6b6b');
      beep(200,0.07,'square',0.02);
      return;
    }
    // Auto-find nearest idle stove (no need to walk there manually)
    let nearStove=-1, nearStoveDist=9999;
    STOVES.forEach((s,i)=>{
      if(G.stoves[i].state!=='idle')return;
      const d=Math.hypot(Sam.x+Sam.w/2-(s.x+s.w/2), Sam.y+Sam.h/2-(s.y+s.h/2));
      if(d<nearStoveDist){nearStoveDist=d;nearStove=i;}
    });
    if(nearStove<0){
      addFloat('Todas las estufas ocupadas!',Sam.x+17,Sam.y,'#ff6b6b');
      return;
    }
    // Detect which client this is for
    const cur=G.clients.find(c=>c.status==='waiting');
    if(!cur||cur.status!=='waiting'){
      addFloat('No hay cliente activo',Sam.x+17,Sam.y,'#ff6b6b');
      return;
    }
    // Start prep animation: Samantina walks to a pan, tosses ingredients, walks to stove
    const panX=ZONES.counter.x+40, panY=ZONES.counter.y+ZONES.counter.h/2;
    G.prep.active=true;
    G.prep.phase=0;
    G.prep.timer=0;
    G.prep.panX=panX;
    G.prep.panY=panY;
    G.prep.ingIdx=0;
    G.prep.targetStove=nearStove;
    G.prep.correctIngredients=G.collected.filter(Boolean);
    clearCollected(); // clear so they don't double-validate later
    G.state='prep';
    Sam.face='normal';
    stopBGMusic();
    return;
  }

  if(G.state==='deliver'){
    tryDeliver();
    return;
  }
}


function resetAfterBurn(msg,x,y){
  playBurn();
  G.stars--;
  screenShake=10;
  Sam.face='burn';
  Sam.faceTimer=90;
  clearCollected();
  G.holding=null;
  G.cookFill=0;
  if(G.cookStoveIdx>=0){
    G.stoves[G.cookStoveIdx].state='idle';
    G.stoves[G.cookStoveIdx].item=null;
    G.stoves[G.cookStoveIdx].timer=0;
    G.stoves[G.cookStoveIdx].max=0;
  }
  G.prep.correctIngredients=[];
  buildShelf(); // permite volver a agarrar ingredientes inmediatamente
  addFloat(msg||'🔥 Quemado! vuelve a cocinar',x||Sam.x+Sam.w/2,y||Sam.y,'#ff4444',1.25);
  G.state='collect';
  stopBGMusic();startBGMusic('collect');
  checkGameOver();
}

function pressTiming(){
  // Evaluate fill position
  const n=G.cookFill;
  let quality;
  if(n>=0.43&&n<=0.57)quality='perfect';
  else if(n>=0.25&&n<=0.75)quality='ok';
  else quality='burned';

  const cur=G.clients.find(c=>c.status==='waiting');
  // Use the ingredients from prep (what was actually cooked)
  const cookedWith=G.prep.correctIngredients.length>0 ? G.prep.correctIngredients : G.collected.filter(Boolean);
  const need=cur.recipe.need;
  // Each of the 5 needed ingredients must appear at least once in cookedWith
  const allCorrect=need.every(ic=>cookedWith.includes(ic));

  if(!allCorrect&&quality!=='burned')quality='bad'; // wrong ingredients = bad taste

  // Finish cooking
  G.stoves[G.cookStoveIdx].state='idle';
  G.stoves[G.cookStoveIdx].item=null;
  clearCollected();
  G.holding=null;

  const plate={
    type:'plate',
    dish:cur.recipe.dish,
    recipe:cur.recipe,
    quality,
    recipeId:cur.recipe.id,
  };

  if(quality==='burned'){
    // No se entrega al cliente: se limpia la estufa y puedes volver a agarrar ingredientes al instante.
    resetAfterBurn('🔥 QUEMADO! intenta de nuevo',Sam.x+Sam.w/2,Sam.y);
    return;
  }

  // All plates (perfect/ok/bad) go to the tray - client reacts when served
  G.tray.push(plate);
  if(quality==='bad'){
    addFloat('Plato listo... (ingredientes raros)',Sam.x+17,Sam.y,'#fcc419',1.0);
    playKitchenBell();
  } else {
    addFloat('¡Plato listo! Ve al mostrador.',Sam.x+17,Sam.y,quality==='perfect'?'#51cf66':'#fcc419',1.1);
    playKitchenBell();
  }
  G.state='collect';
  stopBGMusic();startBGMusic('collect');
}

function tryDeliver(){
  if(!G.holding||G.holding.type!=='plate')return;
  const cur=G.clients.find(c=>c.status==='waiting');
  if(!cur){
    addFloat('No hay cliente esperando',Sam.x+17,Sam.y,'#ff6b6b');
    return;
  }
  const t=TABLES[cur.tableIdx];
  if(!inRange(t.x+t.w/2,t.y+t.h/2,110)){
    addFloat('¡Acércate más a la mesa!',Sam.x+17,Sam.y,'#ff6b6b');
    return;
  }

  // Evaluate delivery
  const quality=G.holding.quality;
  const rightRecipe=(G.holding.recipeId===cur.recipe.id);
  let reaction,stars,earned;

  if(quality==='burned'){
    reaction='burn';stars=0;earned=0;
    G.stars--;Sam.face='burn';Sam.faceTimer=80;screenShake=12;
    playBurn();
    spawnParticles(t.x+t.w/2,t.y,['#333','#555','#888'],18);
    addFloat('🔥 Quemado! -⭐',t.x+t.w/2,t.y-20,'#ff4444',1.2);
  } else if(!rightRecipe||quality==='bad'){
    reaction='bad';stars=0;earned=0;
    G.stars--;Sam.face='bad';Sam.faceTimer=80;screenShake=10;
    playFail();
    spawnParticles(t.x+t.w/2,t.y,['#333','#555','#999'],15);
    addFloat('🤢 Horrible! -⭐',t.x+t.w/2,t.y-20,'#ff6b6b',1.2);
  } else {
    // Good!
    const patienceFrac=1-cur.patienceTimer/cur.patienceMax;
    stars=quality==='perfect'?3:2;
    // Harder money: low base, patience fraction is the main multiplier
    // If client waited too long → almost nothing. Fast delivery → good reward.
    const base=quality==='perfect'?40:20;
    const pBonus=~~(patienceFrac*patienceFrac*60); // quadratic: drops fast when slow
    const rankBonus=currentRankIdx()*4;
    earned=base+pBonus+rankBonus;
    // Max possible: perfect+instant = 40+60+30 = 130 at level 10
    // Typical: ok+half patience = 20+15+level = ~45 at mid game
    if(G.secretBonus){earned*=2;G.secretBonus=false;addFloat('✨ x2 BONUS! +$'+(earned)+'→$'+(earned),t.x+t.w/2,t.y-50,'#ffd700',1.5);}
    if(G.upgrades.doublePoints&&quality==='perfect'){earned*=2;addFloat('⭐ x2 PERFECTO!',t.x+t.w/2,t.y-64,'#ffd700',1.3);}
    // XP gain: quality + patience bonus
    const xpGain=quality==='perfect'?40:25;
    const xpBonus=~~(patienceFrac*20);
    G.xp+=xpGain+xpBonus;
    // Rank-up notification
    const newRankIdx=currentRankIdx();
    if(newRankIdx>G.rankIdx){
      G.rankIdx=newRankIdx;
      const rank=XP_RANKS[newRankIdx];
      addFloat(rank.emoji+' '+rank.label+'!',GW/2,GH/2-60,'#ffd700',1.6);
      playSuccess();
    }
    checkVictory();
    reaction='happy';
    G.score+=earned;G.money+=earned;
    Sam.face='happy';Sam.faceTimer=100;
    playSuccess();playCoin();
    spawnParticles(t.x+t.w/2,t.y,['#fff','#ffe066','#ff8fab','#9bf6ff','#b197fc'],40,true);
    addFloat('+$'+earned,t.x+t.w/2,t.y-20,'#ffd700',1.3);
    if(stars>0)addFloat('⭐'.repeat(Math.max(0,stars)),t.x+t.w/2,t.y-44,'#f59f00',1.2);
    if(G.money>G.best){G.best=G.money;localStorage.setItem('sch2_best',G.best);}
  }

  cur.reaction=reaction;cur.stars=stars;cur.status='eating';
  G.holding=null;
  G.clientsServed++;
  G.state='collect';

  checkGameOver();

  setTimeout(()=>{
    cur.status='leaving';cur.departureT=0;
    G.totalServed++;
    // Find next waiting client automatically
    const next=G.clients.find(c=>c.status==='waiting');
    if(next) buildShelf();
  },2200);
}

function checkVictory(){
  if(G.xp>=XP_VICTORY&&G.state!=='victory'){
    G.state='victory';
    stopBGMusic();
    [523,659,784,1046,1318].forEach((f,i)=>beep(f,0.2,'triangle',0.05,i*0.12));
  }
}

function checkGameOver(){
  if(G.stars<=0){
    screenShake=0; // Game Over fijo, sin temblor
    G.state='gameover';
    stopBGMusic();
    playFail();
  }
}

// SECRET INGREDIENT SPAWNER
// ═══════════════════════════════════════════════════════════════════
// Track if secret already spawned this level
let secretSpawnedThisLevel=false;

function updateSecret(){
  // Only during collect phase AND not yet cooked (G.collected.length < 5)
  if(G.state!=='collect')return;
  if(collectedFull()){
    // Player has all ingredients, hide secret
    if(G.secretActive){G.secretActive=false;}
    return;
  }
  if(G.secretActive){
    G.secretTimer--;
    if(G.secretTimer<=0){G.secretActive=false;}
    return;
  }
  if(secretSpawnedThisLevel)return; // only once per level
  // 20% chance per level, checked once after 3 seconds in
  if(G.ticks===200){
    if(Math.random()<0.20){
      G.secretPos={
        x:260+Math.random()*300,
        y:340+Math.random()*180,
      };
      G.secretActive=true;
      G.secretTimer=120; // exactly 2 seconds at 60fps
      secretSpawnedThisLevel=true;
      playSecret();
      addFloat('⭐ INGREDIENTE SECRETO ⭐',G.secretPos.x,G.secretPos.y-40,'#ffd700',1.3);
    } else {
      secretSpawnedThisLevel=true; // didn't spawn, won't try again
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════════════
function update(){
  G.ticks++;

  if(G.state==='menu'||G.state==='gameover'||G.state==='victory'){
    return;
  }

  // Sam movement
  if(G.state==='collect'||G.state==='deliver'){
    moveSam();
  }

  // Face timer
  if(Sam.faceTimer>0){Sam.faceTimer--;if(Sam.faceTimer===0)Sam.face='normal';}

  // Screen shake
  if(screenShake>0)screenShake--;

  // ── PREP ANIMATION UPDATE ──────────────────────────────────────
  if(G.state==='prep'){
    G.prep.timer++;
    const p=G.prep;
    const stove=STOVES[p.targetStove];
    const stoveCX=stove.x+stove.w/2, stoveCY=stove.y+stove.h/2;

    if(p.phase===0){
      // Walk Sam toward the COUNTER (bandeja/prep table)
      const co=ZONES.counter;
      const tx=co.x+co.w/2-20, ty=co.y+co.h+20;
      const dx=tx-Sam.x, dy=ty-Sam.y;
      const d=Math.hypot(dx,dy);
      if(d>5){
        Sam.x+=dx/d*3.5; Sam.y+=dy/d*3.5;
        Sam.walkTimer++; Sam.dir=dx>0?1:-1;
      } else {
        // Arrived at counter - toss ingredients into pan here
        p.phase=1; p.timer=0; p.ingIdx=0;
        p.panX=co.x+co.w/2; p.panY=co.y+co.h/2;
        playPickup();
      }
    } else if(p.phase===1){
      // Toss ingredients one by one into pan (every 18 ticks)
      if(p.timer%18===0 && p.ingIdx<p.correctIngredients.length){
        const ic=p.correctIngredients[p.ingIdx];
        addFloat(ic, p.panX+20, p.panY-20-p.ingIdx*4, '#fff', 1.1);
        beep(400+p.ingIdx*80, 0.06, 'square', 0.03);
        p.ingIdx++;
      }
      if(p.ingIdx>=p.correctIngredients.length && p.timer>p.correctIngredients.length*18+10){
        // Done tossing, pick up the pan
        G.holding={type:'plate', dish:'🍳', recipeEmoji:'🍳', recipeName:'sartén', recipeId:-1, quality:'ok'};
        p.phase=2; p.timer=0;
        beep(600, 0.08, 'triangle', 0.04);
      }
    } else if(p.phase===2){
      // Walk to stove carrying pan
      const tx=stoveCX-60, ty=stoveCY+10;
      const dx=tx-Sam.x, dy=ty-Sam.y;
      const d=Math.hypot(dx,dy);
      if(d>5){
        Sam.x+=dx/d*3.5; Sam.y+=dy/d*3.5;
        Sam.walkTimer++; Sam.dir=dx>0?1:-1;
      } else {
        // Arrived at stove - start actual cooking
        G.holding=null;
        G.prep.active=false;
        G.cookStoveIdx=p.targetStove;
        const cur=G.clients.find(c=>c.status==='waiting');
        G.stoves[p.targetStove].state='cooking';
        G.stoves[p.targetStove].item={dish:cur.recipe.dish,recipeId:cur.recipe.id};
        G.stoves[p.targetStove].max=400;
        G.stoves[p.targetStove].timer=0;
        G.cookFill=0;
        // Cocción balanceada: nivel 1 ≈7.2s; niveles altos ≈4.3s.
        G.cookSpeed=0.0023+currentRankIdx()*0.00022;
        G.state='cooking';
        startBGMusic('cooking');
        spawnParticles(stoveCX,stoveCY,['#ff922b','#ffe066','#ff3b30'],12);
      }
    }
    return;
  }

  if(G.state==='cooking'){
    // Advance fill bar left → right
    G.cookFill+=G.cookSpeed;
    G.stoves[G.cookStoveIdx].timer=~~(G.cookFill*400);
    G.stoves[G.cookStoveIdx].max=400;
    // Auto-burn when fill reaches 1.0
    if(G.cookFill>=1.0){
      G.cookFill=1.0;
      addFloat('🔥 ¡SE QUEMÓ!',GW/2,GH/2,'#ff4444',1.4);
      resetAfterBurn('🔥 Quemado! vuelve a agarrar ingredientes',GW/2,GH/2-40);
    }
    return;
  }

  // Client arrival/departure animations
  G.clients.forEach(cl=>{
    if(cl.status==='arriving'){
      cl.arrivalT+=3;
      if(cl.arrivalT>=100){cl.arrivalT=100;cl.status='waiting';buildShelf();}
    }
    if(cl.status==='leaving'){
      cl.departureT+=3;
      if(cl.departureT>=100){cl.departureT=100;cl.status='done';}
    }
  });
  // Prune done clients
  if(G.clients.filter(c=>c.status==='done').length>6){
    G.clients=G.clients.filter(c=>c.status!=='done');
  }

  // Dynamic client spawning based on XP rank
  if(G.state==='collect'||G.state==='deliver'||G.state==='prep'){
    G.clientSpawnTick--;
    if(G.clientSpawnTick<=0){
      const rank=currentRank();
      const activeClients=G.clients.filter(c=>c.status!=='done'&&c.status!=='leaving').length;
      if(activeClients<rank.maxClients){
        spawnClientIntoQueue();
        // Next spawn: random interval based on rank (faster at higher rank)
        const minWait=Math.max(8,20-G.rankIdx*2); // seconds
        const maxWait=Math.max(15,35-G.rankIdx*3);
        G.clientSpawnTick=(minWait+Math.random()*(maxWait-minWait))*60;
      } else {
        G.clientSpawnTick=120; // check again in 2s
      }
    }
  }

  // Patience timers for waiting clients — PAUSED while shop is open
  if(G.shopOpen)return;
  G.clients.forEach((cl,ci)=>{
    if(cl.status==='arriving')return;
    if(cl.status!=='waiting')return;
    cl.patienceTimer++;
    // Anger gestures in last 30% of patience
    if(cl.patienceTimer>cl.patienceMax*0.7) cl.angerFrame=G.ticks;
    // Tick warning sounds
    if(cl.patienceTimer===~~(cl.patienceMax*0.75))playTick();
    if(cl.patienceTimer===~~(cl.patienceMax*0.9))playTick();

    // Tic-tic repetido cuando queda poco tiempo (últimos 5 segundos).
    const secondsLeft=Math.max(0,Math.ceil((cl.patienceMax-cl.patienceTimer)/60));
    if(secondsLeft<=5 && secondsLeft>0 && cl.lastUrgentSecond!==secondsLeft){
      cl.lastUrgentSecond=secondsLeft;
      playUrgentTick();
    }

    if(cl.patienceTimer>=cl.patienceMax){
      // Client leaves angry — lose a star
      cl.status='leaving';cl.departureT=0;cl.reaction='bad';
      G.stars--;
      screenShake=10;
      playFail();
      addFloat('😤 Se fue! -⭐',TABLES[cl.tableIdx].x+55,TABLES[cl.tableIdx].y,'#ff6b6b',1.2);
      Sam.face='bad';Sam.faceTimer=80;
      checkGameOver();
      setTimeout(()=>{
        cl.status='done';
        const next=G.clients.find(c=>c.status==='waiting');
        if(next) buildShelf();
      },2000);
    }
  });

  // Secret ingredient
  updateSecret();
}

function txtM(t,x,y,size,color,align,shadow){
  ctx.save();
  ctx.font=`900 ${size}px "Courier New",monospace`;
  ctx.textAlign=align||'left';ctx.textBaseline='middle';
  if(shadow){ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillText(t,~~x+2,~~y+2);}
  ctx.fillStyle=color;ctx.fillText(t,~~x,~~y);ctx.restore();
}
function pxM(x,y,w,h,fill,stroke,sw){
  ctx.fillStyle=fill;ctx.fillRect(~~x,~~y,~~w,~~h);
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw||2;ctx.strokeRect(~~x,~~y,~~w,~~h);}
}
function emM(e,x,y,size){
  ctx.save();ctx.font=`${size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e,~~x,~~y);ctx.restore();
}

function drawMobileIngredientPanel(){
  if(G.state==='cooking'||G.state==='menu'||G.state==='gameover'||G.state==='victory'||G.shopOpen)return;
  const cur=G.clients.find(c=>c.status==='waiting');
  if(!cur)return;

  // Barra inferior fija: pedido + ingredientes + estado del cliente.
  const pw=RW-24, ph=118, x=12, y=RH-ph-12;
  pxM(x+3,y+3,pw,ph,'rgba(0,0,0,0.28)');
  pxM(x,y,pw,ph,'rgba(20,10,0,0.94)','#f59f00',3);

  // Encabezado del pedido siempre visible.
  txtM('PEDIDO: '+cur.recipe.dish+' '+cur.recipe.name,x+16,y+18,14,'#ffd700','left',true);
  txtM('Juntados '+collectedCount()+'/5',x+pw-16,y+18,12,'#fff','right',true);

  // Caja fija de estado del cliente dentro de la barra inferior.
  const stateW=132, stateH=72;
  const stateX=x+pw-stateW-12;
  const stateY=y+34;
  const timeFrac=Math.max(0,Math.min(1,1-(cur.patienceTimer/cur.patienceMax)));
  const secondsLeft=Math.max(0,Math.ceil((cur.patienceMax-cur.patienceTimer)/60));
  const barColor=timeFrac>0.6?'#51cf66':timeFrac>0.3?'#fcc419':'#ff6b6b';
  let mood='🙂', label='TRANQUILO';
  if(timeFrac<0.25){mood='😡';label='URGENTE';}
  else if(timeFrac<0.55){mood='😐';label='ESPERANDO';}

  pxM(stateX+2,stateY+2,stateW,stateH,'rgba(0,0,0,0.25)');
  pxM(stateX,stateY,stateW,stateH,'rgba(0,0,0,0.72)',timeFrac<0.25?'#ff4444':'#f59f00',2);
  txtM('CLIENTE',stateX+stateW/2,stateY+11,10,'#ffd700','center',true);
  emM(mood,stateX+27,stateY+35,24);
  txtM(secondsLeft+'s',stateX+82,stateY+31,19,'#fff','center',true);
  txtM(label,stateX+82,stateY+50,9,barColor,'center',true);
  pxM(stateX+12,stateY+58,stateW-24,8,'rgba(255,255,255,0.16)');
  pxM(stateX+12,stateY+58,(stateW-24)*timeFrac,8,barColor);
  if(timeFrac<0.18){
    ctx.save();
    ctx.globalAlpha=0.28+Math.sin(G.ticks*0.35)*0.24;
    pxM(stateX,stateY,stateW,stateH,'rgba(255,0,0,0.35)');
    ctx.restore();
  }

  // Ingredientes marcados por posición correcta de la receta, no secuencial.
  const leftW=stateX-x-20;
  const slotW=(leftW-10)/5;
  for(let i=0;i<5;i++){
    const sx=x+12+i*slotW, sy=y+44;
    const filled=!!G.collected[i];
    const correct=filled&&G.collected[i]===cur.recipe.need[i];
    const bg=filled?(correct?'rgba(81,207,102,0.38)':'rgba(255,107,107,0.38)'):'rgba(255,255,255,0.08)';
    const border=filled?(correct?'#51cf66':'#ff6b6b'):'rgba(255,255,255,0.18)';
    pxM(sx,sy,slotW-6,52,bg,border,2);
    if(filled){
      emM(G.collected[i],sx+(slotW-6)/2,sy+25,27);
      txtM('✓',sx+slotW-16,sy+9,10,correct?'#b2f2bb':'#ffc9c9','center');
    }else{
      emM(cur.recipe.need[i]||'•',sx+(slotW-6)/2,sy+23,24);
      ctx.save();ctx.globalAlpha=0.35;
      txtM((i+1)+'',sx+8,sy+9,9,'#fff','left');
      ctx.restore();
    }
  }
}


// ═══════════════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════════════
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,RW,RH);

  // Fondo vertical del teléfono.
  const phoneBg=ctx.createLinearGradient(0,0,0,RH);
  phoneBg.addColorStop(0,'#2a1200');phoneBg.addColorStop(1,'#0c0400');
  ctx.fillStyle=phoneBg;ctx.fillRect(0,0,RW,RH);

  if(G.state==='menu'){
    ctx.save();
    const fit=FIT_SCALE, ox=(RW-GW*fit)/2, oy=(RH-GH*fit)/2;
    ctx.translate(ox,oy);ctx.scale(fit,fit);
    drawMenu();
    if(G.shopOpen)drawShop();
    ctx.restore();
    return;
  }

  // Cámara vertical: mantiene proporciones reales y sigue a Samantina en horizontal.
  const viewW=RW/GAME_ZOOM, viewH=(RH-GAME_TOP)/GAME_ZOOM;
  camX=Math.max(0,Math.min(GW-viewW,Sam.x+Sam.w/2-viewW/2));
  camY=Math.max(0,Math.min(Math.max(0,GH-viewH),Sam.y+Sam.h/2-viewH/2));

  ctx.save();
  ctx.translate(0,GAME_TOP);
  ctx.scale(GAME_ZOOM,GAME_ZOOM);
  ctx.translate(-camX,-camY);
  if(screenShake>0 && G.state!=='gameover'){
    ctx.translate((Math.random()-0.5)*screenShake*1.5,(Math.random()-0.5)*screenShake*1.5);
  }

  drawKitchen();
  drawShelf();
  drawCustomers();
  drawSecret();
  drawSam();
  updateDrawEffects();
  drawPrepOverlay();
  drawCookingOverlay();

  ctx.restore();

  // Escenas finales dibujadas en coordenadas de pantalla vertical,
  // no dentro de la cámara del mundo. Así no se cortan en teléfono.
  if(G.state==='gameover'){
    drawGameOverScreen();
    return;
  }
  if(G.state==='victory'){
    drawVictoryScreen();
    return;
  }

  drawMobileHUD();
  drawMobileIngredientPanel();

  if(G.shopOpen){
    ctx.save();
    const fit=FIT_SCALE, ox=(RW-GW*fit)/2, oy=(RH-GH*fit)/2;
    ctx.translate(ox,oy);ctx.scale(fit,fit);
    drawShop();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════════════
let _lastCtrlState=null;
function loop(){
  update();draw();
  // Show/hide control bar
  const inGame=G.state==='collect'||G.state==='deliver'||G.state==='prep'||G.state==='cooking';
  const showCtrl=inGame&&!G.shopOpen;
  if(showCtrl!==_lastCtrlState){
    _lastCtrlState=showCtrl;
    setCtrl(showCtrl);
  }
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(G.shopOpen){
    if(e.key==='Escape'||e.key==='x'||e.key==='X'){G.shopOpen=false;}
    return;
  }
  if(e.key==='Enter'||e.key===' '){e.preventDefault();doGrab();}
  if(e.key==='c'||e.key==='C'){e.preventDefault();doCook();}
  if(e.key==='x'||e.key==='X'){e.preventDefault();dropLastIngredient();}
  if(e.key==='Escape'){if(G.state!=='menu')resetToMenu();}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// D-pad
[['dpUp','up'],['dpDown','down'],['dpLeft','left'],['dpRight','right']].forEach(([id,dir])=>{
  const el=document.getElementById(id);
  if(!el)return;
  const on=e=>{e.preventDefault();dpad2[dir]=true;};
  const off=()=>{dpad2[dir]=false;};
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointercancel',off);
  el.addEventListener('pointerleave',off);
});

document.getElementById('bGrab').addEventListener('pointerdown',e=>{e.preventDefault();doGrab();});
document.getElementById('bCook').addEventListener('pointerdown',e=>{e.preventDefault();doCook();});
document.getElementById('bDrop').addEventListener('pointerdown',e=>{e.preventDefault();dropLastIngredient();});

// Canvas tap for menu/gameover/victory/shop
let shopScrollStart=0,shopScrollYStart=0,shopDragging=false;

C.addEventListener('pointerdown',e=>{
  const {mx,my}=screenToWorld(e);

  if(G.shopOpen){
    shopScrollStart=e.clientY;
    shopScrollYStart=shopScrollY;
    shopDragging=true;
    C.setPointerCapture(e.pointerId);
    // Tap (not drag) handled on pointerup
    return;
  }

  // In-game HUD shop button
  if(G.state==='collect'||G.state==='deliver'||G.state==='prep'){
    const hs=drawHUD._shopRect;
    if(hs&&mx>=hs.x&&mx<=hs.x+hs.w&&my>=hs.y&&my<=hs.y+hs.h){
      G.shopOpen=true;shopScrollY=0;return;
    }
  }

  if(G.state==='menu'){
    // Play button
    const pr=drawMenu._playRect;
    if(pr&&mx>=pr.x&&mx<=pr.x+pr.w&&my>=pr.y&&my<=pr.y+pr.h){doGrab();return;}
    // Shop button
    const sr=drawMenu._shopRect;
    if(sr&&mx>=sr.x&&mx<=sr.x+sr.w&&my>=sr.y&&my<=sr.y+sr.h){
      G.shopOpen=true;shopScrollY=0;return;
    }

    // Botones de prueba de escenas finales
    const vr=drawMenu._victoryRect;
    if(vr&&mx>=vr.x&&mx<=vr.x+vr.w&&my>=vr.y&&my<=vr.y+vr.h){
      G.xp=XP_VICTORY;
      G.score=Math.max(G.score,999);
      G.money=Math.max(G.money,250);
      G.totalServed=Math.max(G.totalServed,12);
      G.state='victory';
      setCtrl(false);
      playSuccess();
      return;
    }
    const gr=drawMenu._gameOverRect;
    if(gr&&mx>=gr.x&&mx<=gr.x+gr.w&&my>=gr.y&&my<=gr.y+gr.h){
      G.stars=0;
      G.score=Math.max(G.score,120);
      G.money=Math.max(G.money,25);
      G.state='gameover';
      setCtrl(false);
      playFail();
      return;
    }

    doGrab();return;
  }
  if(G.state==='gameover'||G.state==='victory'){doGrab();}
});

C.addEventListener('pointermove',e=>{
  if(!shopDragging)return;
  const dy=(e.clientY-shopScrollStart)/canvasScale/RENDER_SY;
  const maxScroll=Math.max(0,(drawShop._totalH||0)-(GH-64));
  shopScrollY=Math.max(0,Math.min(maxScroll,shopScrollYStart-dy));
});

C.addEventListener('pointerup',e=>{
  if(!shopDragging)return;
  const dy=Math.abs(e.clientY-shopScrollStart);
  shopDragging=false;
  if(dy<10){
    // It was a tap
    const {mx,my}=screenToWorld(e);
    handleShopClick(mx,my);
  }
});

loop();
</script>
