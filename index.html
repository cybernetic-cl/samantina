function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function rand(a,b){return Math.random()*(b-a)+a}
function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function beep(f=440,d=.06,type="square",vol=.035){
 if(muted)return;
 const ac=window.ac||(window.ac=new (window.AudioContext||window.webkitAudioContext)());
 const o=ac.createOscillator();
 const g=ac.createGain();
 o.frequency.value=f;
 o.type=type;
 g.gain.value=vol;
 g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
 o.connect(g);
 g.connect(ac.destination);
 o.start();
 o.stop(ac.currentTime+d+.02);
}

function noise(d=.12,vol=.025){
 if(muted)return;
 const ac=window.ac||(window.ac=new (window.AudioContext||window.webkitAudioContext)());
 const b=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate);
 const data=b.getChannelData(0);
 for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
 const s=ac.createBufferSource();
 const g=ac.createGain();
 s.buffer=b;
 g.gain.value=vol;
 s.connect(g);
 g.connect(ac.destination);
 s.start();
}

function startMusic(mode="collect"){
 if(muted) return;
 if(musicMode===mode && musicTimer) return;
 stopMusic();
 musicMode=mode;
 musicStep=0;
 const collectMelody=[392,440,494,523,587,523,494,440,392,523,587,659,587,523,494,440];
 const cookMelody=[330,392,440,494,440,392,330,294,330,392,523,494,440,392,330,294];
 const winMelody=[523,659,784,1046,784,659,523,659,784,1046,1174,1046,784,659,523];
 const melody=mode==="cooking"?cookMelody:(mode==="win"?winMelody:collectMelody);
 const tempo=mode==="cooking"?210:260;
 musicTimer=setInterval(()=>{
  if(muted || state==="menu"){ return; }
  const note=melody[musicStep%melody.length];
  beep(note,.10,mode==="cooking"?"square":"triangle",mode==="cooking"?.018:.014);
  if(musicStep%4===0) beep(note/2,.14,"sine",.010);
  musicStep++;
 },tempo);
}
function stopMusic(){
 if(musicTimer) clearInterval(musicTimer);
 musicTimer=null;
 musicMode="";
}
function ensureMusic(){
 if(muted){ stopMusic(); return; }
 if(state==="collect") startMusic("collect");
 if(state==="cooking") startMusic("cooking");
 if(state==="taste" && cookResult) startMusic("win");
}

function customerCountForLevel(){
 return level<=3 ? 1 : (level<=7 ? 2 : 3);
}
function activeOrder(){
 return customers[currentCustomerIndex] ? customers[currentCustomerIndex].recipe : recipes[level];
}
function buildCustomers(){
 customers=[];
 const count=customerCountForLevel();
 const orderPool=shuffle(recipes.map((r,i)=>i).filter(i=>i!==level));
 const indexes=[level,...orderPool].slice(0,count);
 const positions=[
  {x:720,y:330},
  {x:650,y:330},
  {x:790,y:330}
 ];
 for(let i=0;i<count;i++){
  const recipeIndex=indexes[i%indexes.length];
  customers.push({
   x:positions[i].x,
   y:positions[i].y,
   w:58,
   h:72,
   gender:Math.random()>.5?"woman":"man",
   recipe:recipes[recipeIndex],
   recipeIndex,
   status:"waiting", // waiting | happy | bad | burned
   reactionTimer:0,
   patience:1000-level*45-i*80,
   maxPatience:1000-level*45-i*80,
   reactionJump:0,
   served:false,
   bob:rand(0,20)
  });
 }
 currentCustomerIndex=0;
 servedThisLevel=0;
}

function scatterIngredientsForOrder(){

 const decoys=shuffle(recipes.flatMap(r=>r.decoys).concat(recipes.flatMap(r=>r.need))).filter((v,i,a)=>a.indexOf(v)===i && !order.need.includes(v)).slice(0,4);
 const all=shuffle([...order.need,...decoys]);
 const spots=[
  [62,205],[165,232],[285,205],[585,205],
  [82,385],[205,430],[335,410],[470,420],
  [92,515],[245,530],[405,535],[555,515]
 ];
 items=all.map((t,i)=>({
  t,
  x:spots[i][0],
  y:spots[i][1],
  w:42,
  h:42,
  taken:false,
  bob:rand(0,20)
 }));
}

function px(x,y,w,h,c){
 ctx.fillStyle=c;
 ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));
}

function txt(t,x,y,size=22,color="#2b1205",align="left",stroke=true){
 ctx.save();
 ctx.font=`900 ${size}px "Courier New", monospace`;
 ctx.textAlign=align;
 if(stroke){
  ctx.lineWidth=5;
  ctx.strokeStyle="rgba(255,255,255,.8)";
  ctx.strokeText(t,x,y);
 }
 ctx.fillStyle=color;
 ctx.fillText(t,x,y);
 ctx.restore();
}

function distanceToSam(item){
 return Math.hypot(
  (sam.x+sam.w/2)-(item.x+item.w/2),
  (sam.y+sam.h/2)-(item.y+item.h/2)
 );
}

function drawIngredient(item){

 const d=distanceToSam(item);

 ctx.save();

 if(d<78){
  ctx.shadowColor="#ffe066";
  ctx.shadowBlur=24;
  px(item.x-10,y-10,66,66,"#fff3bf");
 }

 ctx.shadowColor="rgba(0,0,0,.25)";
 ctx.shadowBlur=8;
 ctx.shadowOffsetY=5;
 px(item.x-6,y-6,58,58,"#fff6dd");
 px(item.x-2,y-2,50,50,"#fefefe");
 ctx.shadowBlur=0;

 if(item.t==="aceite"){
  // Aceite dibujado como botellita para que no parezca ingrediente raro.

}else{

}

function update(){
 timer++;
 expressionAnim++;

 // Ingrediente secreto: aparece ocasionalmente por 3 segundos.
 if(state==="collect" || state==="deliver"){
  if(!secretCollected && !secretItem && timer%520===0) spawnSecretIngredient();
  if(secretItem){
   secretTimer--;
   if(secretTimer<=0){
    secretItem=null;
    secretTimer=0;
   }
   tryCollectSecret();
  }
 }

 if(phaseTimer>0)phaseTimer--;
 if(cameraShake>0)cameraShake--;

 particles.forEach(p=>{
  p.x+=p.vx;
  p.y+=p.vy;
  p.vy+=.04;
  p.life--;
 });
 particles=particles.filter(p=>p.life>0);

 smoke.forEach(p=>{
  p.y-=p.v;
  p.x+=Math.sin(timer/10+p.o)*.4;
  p.life--;
 });
 smoke=smoke.filter(p=>p.life>0);
 customers.forEach(c=>{ if(c.reactionTimer>0)c.reactionTimer--; if(c.reactionJump>0)c.reactionJump--; });

 if(state==="collect" || state==="deliver"){
  customers.forEach((c,idx)=>{
   if(!c.served && c.status==="waiting"){
    c.patience--;
    if(c.patience<=0){
     c.patience=0;
     c.status="bad";
     c.reactionTimer=180;
     lives--;
     if(idx===currentCustomerIndex){
      phaseText="El cliente perdió la paciencia";
      phaseTimer=120;
     }
    }
   }
  });
  if(state==="collect"){
   if(timer%60===0)timeLeft--;
   if(timeLeft<=0){
    lives--;
    showTaste(false,"⏱️ Se acabó el tiempo");
   }
  }

  let dx=0,dy=0;
  if(keys.ArrowLeft||keys.a)dx=-1;
  if(keys.ArrowRight||keys.d)dx=1;
  if(keys.ArrowUp||keys.w)dy=-1;
  if(keys.ArrowDown||keys.s)dy=1;

  if(dx||dy){
   let oldX=sam.x;
   let oldY=sam.y;
   let m=Math.hypot(dx,dy);
   sam.x+=dx/m*3.5;
   sam.y+=dy/m*3.5;
   sam.walk++;
   sam.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?"right":"left"):(dy>0?"down":"up");

   // La estufa es sólida, pero SOLO se bloquea en zona de recolección.
   // Al llevar el plato, Samantina puede rodearla y caminar libremente hacia la mesa.
   if(state==="collect"){
    const body={x:sam.x+6,y:sam.y+26,w:sam.w-12,h:sam.h-20};
    if(rect(body,stoveBlockRect())){
     sam.x=oldX;
     sam.y=oldY;
     phaseText="Cuidado: la estufa quema. Acércate de frente y presiona COCINAR.";
     phaseTimer=80;
    }
   }
  }

  sam.x=Math.max(10,Math.min(W-55,sam.x));
  sam.y=Math.max(140,Math.min(H-82,sam.y));
 }

 if(state==="deliver"){
  const c=customers[currentCustomerIndex];
  if(c && !c.served){
   const zone=customerDeliveryZone(c);
   const body={x:sam.x+4,y:sam.y+24,w:sam.w-8,h:sam.h-18};
   if(rect(body,zone)){
    phaseText="Presiona AGARRAR, ENTER o COCINAR para entregar";
    phaseTimer=25;
   }
  }
 }

 if(state==="cooking"){
  cookTicks++;
  cookNeedle+=cookDir*(.012+level*.0018);

  if(cookNeedle>1){
   cookNeedle=1;
   cookDir=-1;
  }

  if(cookNeedle<0){
   cookNeedle=0;
   cookDir=1;
  }

  if(cookTicks%6===0){
   smoke.push({
    x:stove.x+75+rand(-20,20),
    y:stove.y+18,
    v:rand(.8,1.7),
    o:rand(0,6),
    life:55,
    c:cookTicks>520?"#333":"#fff"
   });
  }

  if(cookTicks>650){
   lives--;
   cameraShake=22;
   beep(90,.18,"sawtooth",.05);
   showTaste(false,"🔥 Se quemó por esperar mucho");
  }
 }
}

/* FIX REAL: ahora detecta todos los ingredientes no tomados */
function nearestItem(){
 let near=null;
 let dist=999;

 for(const it of items){
  if(it.taken) continue;

  const d=Math.hypot(
   (sam.x+sam.w/2)-(it.x+it.w/2),
   (sam.y+sam.h/2)-(it.y+it.h/2)
  );

  if(d<dist){
   dist=d;
   near=it;
  }
 }

 return dist<78 ? near : null;
}

/* FIX REAL: permite agarrar hasta 5 ingredientes sin bloquearse */
function grab(){
 if(state==="menu"){
  startLevel(0);
  return;
 }

 if(state==="taste"){
  next();
  return;
 }

 if(state==="win"){
  level=0;
  score=0;
  lives=3;
  startLevel(0);
  return;
 }

 if(state==="deliver"){
  const c=customers[currentCustomerIndex];
  const zone=c?customerDeliveryZone(c):null;
  const body={x:sam.x+4,y:sam.y+24,w:sam.w-8,h:sam.h-18};
  if(zone && rect(body,zone)){
   startCooking();
  }else{
   state="collect";
   phaseText="Puedes juntar ingredientes para otro plato o ir a entregar";
   phaseTimer=90;
  }
  return;
 }

 if(state!=="collect") return;

 const it=nearestItem();

 if(!it){
  phaseText="Acércate más al ingrediente";
  phaseTimer=70;
  beep(190,.07);
  return;
 }

 if(selected.length>=5){
  phaseText="Ya tienes 5 ingredientes. Ve a la estufa.";
  phaseTimer=80;
  beep(250,.07);
  return;
 }

 it.taken=true;
 selected.push(it.t);
 sam.holding=it.t;

 beep(800,.05);
 phaseText="✔ "+it.t+" ("+selected.length+"/5)";
 phaseTimer=90;
}

function startCooking(){
 if(state==="deliver"){
  const c=customers[currentCustomerIndex];
  if(c){
   const zone=customerDeliveryZone(c);
   const body={x:sam.x+4,y:sam.y+24,w:sam.w-8,h:sam.h-18};
   const nearStoveForMore=Math.hypot((sam.x+sam.w/2)-(stove.x+stove.w/2),(sam.y+sam.h/2)-(stove.y+stove.h/2))<135;

   if(rect(body,zone)){
    deliverToCustomer();
   }else if(nearStoveForMore && selected.length===5){
    // Permite múltiples platos: puedes cocinar otro antes de entregar.
    state="collect";
    startCooking();
   }else{
    phaseText="Entrega en el área amarilla o cocina otro plato si tienes 5 ingredientes";
    phaseTimer=90;
    beep(220,.08);
   }
  }
  return;
 }

 if(state==="collect"){
  if(selected.length<5){
   phaseText="Debes juntar 5 ingredientes";
   phaseTimer=90;
   beep(180,.08);
   return;
  }

  const nearStove=Math.hypot((sam.x+sam.w/2)-(stove.x+stove.w/2),(sam.y+sam.h/2)-(stove.y+stove.h/2))<135;

  if(!nearStove){
   phaseText="Lleva los ingredientes a la estufa";
   phaseTimer=100;
   beep(240,.07);
   return;
  }

  state="cooking";
  phaseText="Cocinando para: "+activeOrder().name;
  phaseTimer=110;
  cookNeedle=0;
  cookDir=1;
  cookTicks=0;
  sam.x=stove.x-60;
  sam.y=stove.y+30;
  sam.face="normal";
  sam.holding=null;
  noise(.18,.025);
  foodOnPan=[...selected];
  ensureMusic();
 }else if(state==="cooking"){
  pressTiming();
 }
}

function pressTiming(){
 const perfect=cookNeedle>.43&&cookNeedle<.57;
 const ok=cookNeedle>.32&&cookNeedle<.68;
 const r=activeOrder();
 const correct=selected.filter(x=>r.need.includes(x)).length;
 const allCorrect=correct===5 && selected.length===5;

 const newPlate={
  recipe:r,
  selected:[...selected],
  cookedPerfect:perfect,
  cookedOk:ok,
  burned:!ok,
  horrible:!allCorrect,
  good:(perfect||ok)&&allCorrect
 };

 plates.push(newPlate);
 selectedPlateIndex=plates.length-1;
 platedMeal=plates[selectedPlateIndex];

 sam.holding="plato";
 deliveryMode=true;
 state="deliver";
 cookResult=null;
 selected=[];
 foodOnPan=[];
 phaseText="Plato agregado a la bandeja ("+plates.length+"). Llévalo o cocina otro.";
 phaseTimer=150;
 beep(newPlate.good?880:150,.12,newPlate.good?"triangle":"sawtooth",.04);
 ensureMusic();
}

function customerDeliveryZone(c){
 // Zona amplia frente a la mesa y alrededor del cliente activo.
 // Así Samantina no necesita tocar al cliente pixel-perfect.
 return {
  x:table.x-120,
  y:table.y-120,
  w:table.w+240,
  h:table.h+240
 };
}

function deliverToCustomer(){
 const c=customers[currentCustomerIndex];
 if(!c) return;
 if(!platedMeal && plates.length>0) platedMeal=plates[selectedPlateIndex]||plates[0];
 if(!platedMeal) return;

 c.served=true;
 c.reactionTimer=360;

 if(platedMeal.good){
  c.status="happy";
  const earned=20+level*5+Math.floor(c.patience/60);
  const basePoints=120+level*25+timeLeft*2+earned;
  const multiplier=secretBonusReady ? 2 : 1;
  money+=earned*multiplier;
  localStorage.setItem('samantina_money',money);
  levelStars++;
  score+=basePoints*multiplier;
  c.reactionJump=240;
  if(secretBonusReady){
   phaseText="✨ Ingrediente secreto: puntaje x2";
   phaseTimer=150;
   for(let b=0;b<40;b++){
    particles.push({x:c.x+30,y:c.y-10,vx:rand(-4,4),vy:rand(-6,1),life:rand(45,90),c:"#ffe066"});
   }
   secretBonusReady=false;
  }
  for(let i=0;i<65;i++){
   particles.push({
    x:c.x+28,
    y:c.y+8,
    vx:rand(-3,3),
    vy:rand(-5,1),
    life:rand(45,95),
    c:["#fff","#ffe066","#ff8fab","#9bf6ff","#bdb2ff"][i%5]
   });
  }
  beep(880,.08);setTimeout(()=>beep(1170,.1),90);setTimeout(()=>beep(1560,.12),180);
 }else{
  c.status=platedMeal.burned?"burned":"bad";
  lives--;
  cameraShake=18;
  for(let i=0;i<24;i++){
   smoke.push({x:c.x+28+rand(-15,15),y:c.y+20,v:rand(.8,1.8),o:rand(0,6),life:70,c:"#333"});
  }
  beep(120,.18,"sawtooth",.05);
 }

 selected=[];
 foodOnPan=[];
 platedMeal=null;
 deliveryMode=false;
 plates=[];
 selectedPlateIndex=0;
 levelStars=0;
 secretItem=null;
 secretTimer=0;
 secretCollected=false;
 secretBonusReady=false;
 sam.holding=null;
 servedThisLevel++;
 currentCustomerIndex++;

 if(score>best){
  best=score;
  localStorage.setItem("samantina_best",best);
 }

 if(lives<=0){
  phaseText="Juego terminado";
  phaseTimer=180;
  setTimeout(()=>{state="menu";score=0;lives=3;level=0;},900);
  return;
 }

 if(servedThisLevel>=customers.length){
  if(level>=recipes.length-1){
   state="win";
   sam.face="happy";
   ensureMusic();
  }else{
   phaseText="¡Mesa atendida! Siguiente nivel";
   phaseTimer=120;
   setTimeout(()=>startLevel(level+1),900);
  }
 }else{
  state=plates.length>0?"deliver":"collect";
  sam.face="normal";
  scatterIngredientsForOrder();
  timeLeft=Math.max(45,timeLeft+35);
  phaseText="Nuevo pedido: "+activeOrder().name;
  phaseTimer=150;
  ensureMusic();
 }
}

function showTaste(success,msg){
 state="taste";
 cookResult=success;
 phaseText=msg;
 phaseTimer=999;
 sam.face=success?"happy":(msg.includes("quem")?"burn":"bad");
 expressionAnim=0;
 ensureMusic();

 if(success){
  for(let i=0;i<80;i++){
   particles.push({
    x:W/2,
    y:180,
    vx:rand(-4,4),
    vy:rand(-6,1),
    life:rand(50,110),
    c:["#fff","#ffe066","#ff8fab","#9bf6ff","#bdb2ff"][i%5]
   });
  }
  beep(880,.08);
  setTimeout(()=>beep(1170,.1),90);
  setTimeout(()=>beep(1560,.12),180);
 }else{
  for(let i=0;i<25;i++){
   smoke.push({
    x:stove.x+75+rand(-30,30),
    y:stove.y+20,
    v:rand(1,2.4),
    o:rand(0,6),
    life:80,
    c:"#333"
   });
  }
  beep(120,.18,"sawtooth",.05);
 }

 if(score>best){
  best=score;
  localStorage.setItem("samantina_best",best);
 }
}

function next(){
 if(lives<=0){
  state="menu";
  score=0;
  lives=3;
  level=0;
  return;
 }

 if(cookResult && level<recipes.length-1){
  startLevel(level+1);
 }else if(cookResult && level>=recipes.length-1){
  state="win";
  sam.face="happy";
 }else{
  startLevel(level);
 }
}

function drawHUD(){
 px(12,12,W-24,76,"rgba(255,255,255,.88)");
 ctx.strokeStyle="#3a1d0a";
 ctx.lineWidth=4;
 ctx.strokeRect(12,12,W-24,76);

 const r=activeOrder()||recipes[0];
 txt(`Nivel ${level+1}/10  Cliente ${Math.min(currentCustomerIndex+1,customers.length)}/${customers.length}: ${r.name}`,92,42,20,"#2b1205");
 txt(`❤ ${lives}   ⭐ ${score}   💰 ${money}   🌟 ${levelStars}/${customers.length}   ⏱ ${timeLeft}s`,92,72,18,"#2b1205");
 txt(secretBonusReady ? "✨ Secreto activo: próximo plato bueno x2" : (plates.length>0 ? `🍽️ Bandeja: ${plates.map(p=>p.recipe.dish).join(" ")} (${plates.length})` : `Ingredientes: ${selected.map(x=>icons[x]).join(" ")} ${selected.length}/5`),W-30,72,20,"#2b1205","right");

 if(phaseTimer>0){
  px(170,98,W-340,42,"rgba(0,0,0,.62)");
  txt(phaseText,W/2,126,18,"#fff","center",false);
 }
}

function drawCooking(){
 px(0,0,W,H,"rgba(0,0,0,.45)");
 px(170,120,620,365,"#fff1c9");
 ctx.strokeStyle="#5b2b12";
 ctx.lineWidth=7;
 ctx.strokeRect(170,120,620,365);

 txt("¡Momento exacto para "+activeOrder().name+"!",W/2,165,28,"#3a1d0a","center");
 txt("Presiona COCINAR o ESPACIO cuando la aguja esté en verde",W/2,200,18,"#3a1d0a","center");

 ctx.beginPath();
 ctx.ellipse(W/2,286,120,48,0,0,Math.PI*2);
 ctx.fillStyle="#383838";
 ctx.fill();

 px(W/2+90,275,135,22,"#2b2b2b");
 txt("🍳",W/2,304,80,"#111","center",false);

 foodOnPan.forEach((f,i)=>txt(icons[f],W/2-70+i*35,295+Math.sin(timer/8+i)*4,31,"#111","center",false));

 for(let i=0;i<8;i++){
  ctx.beginPath();
  ctx.arc(W/2-70+i*20,350+Math.sin(timer/5+i)*5,13,0,Math.PI*2);
  ctx.fillStyle=i%2?"#ff922b":"#ff3b30";
  ctx.fill();
 }

 const bx=250,by=405,bw=460,bh=34;
 px(bx,by,bw,bh,"#d9480f");
 px(bx+bw*.32,by,bw*.36,bh,"#ffd43b");
 px(bx+bw*.43,by,bw*.14,bh,"#2f9e44");

 px(bx+bw*cookNeedle-5,by-16,10,bh+32,"#fff");
 ctx.strokeStyle="#111";
 ctx.lineWidth=3;
 ctx.strokeRect(bx+bw*cookNeedle-5,by-16,10,bh+32);

 txt(cookTicks>520?"¡SE QUEMA!":"Perfecto en el centro verde",W/2,462,20,cookTicks>520?"#d00000":"#1b5e20","center");
}

function drawTaste(){
 px(0,0,W,H,cookResult?"rgba(255,240,160,.55)":"rgba(60,40,30,.55)");

 if(cookResult){
  for(let i=0;i<9;i++){
   ctx.globalAlpha=.28;
   ctx.beginPath();
   ctx.arc(W/2,150,80+i*45,0,Math.PI*2);
   ctx.fillStyle=["#fff","#ffe066","#ffd6a5"][i%3];
   ctx.fill();
  }
  ctx.globalAlpha=1;
 }

 px(215,115,530,405,"#fff7dd");
 ctx.strokeStyle="#5b2b12";
 ctx.lineWidth=7;
 ctx.strokeRect(215,115,530,405);

 txt(cookResult?"¡DELICIOSO!":"¡OH NO!",W/2,180,34,cookResult?"#15803d":"#9d0208","center");

 const oldX=sam.x, oldY=sam.y;
 sam.x=455;
 sam.y=240;
 drawSamantina();
 sam.x=oldX;
 sam.y=oldY;

 txt((recipes[level]||recipes[0]).dish,W/2,342,92,"#111","center",false);
 txt("Presiona AGARRAR / Enter para continuar",W/2,462,18,"#2b1205","center");
}

function drawMenu(){
 drawKitchen();

 px(180,145,600,330,"rgba(255,247,221,.94)");
 ctx.strokeStyle="#5b2b12";
 ctx.lineWidth=8;
 ctx.strokeRect(180,145,600,330);

 txt("SAMANTINA CHEF",W/2,210,44,"#2b1205","center");
 txt("Atiende clientes, cocina varios platos y gana dinero/estrellas",W/2,260,20,"#2b1205","center");
 txt("Flechas/WASD para moverte  •  AGARRAR para recoger  •  C para cocinar",W/2,305,18,"#2b1205","center");
 txt("El cliente reacciona: verde si está horrible/quemado, feliz si le gusta",W/2,335,18,"#9d0208","center");

 const oldX=sam.x, oldY=sam.y, oldFace=sam.face;
 sam.x=454;
 sam.y=365;
 sam.face="normal";
 drawSamantina();
 sam.x=oldX;
 sam.y=oldY;
 sam.face=oldFace;

 txt("Presiona AGARRAR o Enter para jugar",W/2,525,24,"#2b1205","center");
}

function drawWin(){
 drawKitchen();

 px(160,140,640,360,"rgba(255,255,255,.92)");
 ctx.strokeStyle="#5b2b12";
 ctx.lineWidth=8;
 ctx.strokeRect(160,140,640,360);

 txt("🏆 ¡SAMANTINA MASTER CHEF!",W/2,230,38,"#2b1205","center");
 txt("Puntaje final: "+score,W/2,285,26,"#15803d","center");
 txt("Mejor puntaje: "+best+"   Dinero: $"+money,W/2,325,22,"#2b1205","center");

 const oldX=sam.x, oldY=sam.y, oldFace=sam.face;
 sam.x=455;
 sam.y=360;
 sam.face="happy";
 drawSamantina();
 sam.x=oldX;
 sam.y=oldY;
 sam.face=oldFace;

 txt("AGARRAR / Enter para jugar de nuevo",W/2,540,22,"#2b1205","center");
}

function draw(){
 ctx.save();

 if(cameraShake>0){
  ctx.translate(rand(-5,5),rand(-5,5));
 }

 if(state==="menu"){
  drawMenu();
  ctx.restore();
  return;
 }

 if(state==="win"){
  drawWin();
  ctx.restore();
  return;
 }

 drawKitchen();

 if(state==="deliver" && customers[currentCustomerIndex]){
  const dz=customerDeliveryZone(customers[currentCustomerIndex]);
  ctx.save();
  ctx.globalAlpha=.18;
  px(dz.x,dz.y,dz.w,dz.h,"#ffe066");
  ctx.globalAlpha=1;
  ctx.setLineDash([8,8]);
  ctx.strokeStyle="#f59f00";
  ctx.lineWidth=4;
  ctx.strokeRect(dz.x,dz.y,dz.w,dz.h);
  ctx.setLineDash([]);
  ctx.restore();
 }

 items.forEach(i=>{
  if(!i.taken)drawIngredient(i);
 });

 drawSecretIngredient();

 customers.forEach((c,i)=>drawCustomer(c,i));

 // bandeja con múltiples platos preparados
 if(plates.length>0){
  px(30,92,210,46,"rgba(255,255,255,.9)");
  ctx.strokeStyle="#5b2b12";ctx.lineWidth=3;ctx.strokeRect(30,92,210,46);
  txt("Bandeja",76,122,16,"#2b1205","center",false);
  plates.forEach((p,i)=>txt(p.recipe.dish,128+i*32,124,28,"#111","center",false));
 }

 drawSamantina();
 drawHUD();

 smoke.forEach(s=>{
  ctx.globalAlpha=Math.max(0,s.life/80)*.6;
  ctx.beginPath();
  ctx.arc(s.x,s.y,18+(80-s.life)*.3,0,Math.PI*2);
  ctx.fillStyle=s.c||"#fff";
  ctx.fill();
  ctx.globalAlpha=1;
 });

 particles.forEach(p=>{
  ctx.globalAlpha=Math.max(0,p.life/100);
  px(p.x,p.y,7,7,p.c);
  ctx.globalAlpha=1;
 });

 if(state==="cooking")drawCooking();
 if(state==="taste")drawTaste();

 ctx.restore();
}

function loop(){
 update();
 ensureMusic();
 draw();
 requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
 keys[e.key]=true;

 if(e.key==="Enter"){
  grab();
 }

 if(e.code==="Space"){
  e.preventDefault();
  if(state==="cooking")pressTiming();
  else grab();
 }
 if(e.key==="c" || e.key==="C"){
  startCooking();
 }
});

document.addEventListener("keyup",e=>{
 keys[e.key]=false;
});

document.getElementById("actionBtn").onclick=grab;
document.getElementById("cookBtn").onclick=startCooking;

document.getElementById("soundBtn").onclick=()=>{
 muted=!muted;
 document.getElementById("soundBtn").textContent=muted?"🔇":"🔊";
 if(muted) stopMusic(); else ensureMusic();
};

canvas.addEventListener("click",()=>{
 if(state==="menu"||state==="taste"||state==="win")grab();
});

loop();
</script>
</body>
</html>
